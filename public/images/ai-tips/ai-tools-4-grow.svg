<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="“台帳”は育てるもの、という図。鉢植えの木から3枚の葉のカード（事業所の台帳、現場の実感、失敗のメモ）が伸び、人が水をやり、ロボットが新しい記録カードを差し出している。きょうの記録が、あしたのAIを育てる">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <text x="24" y="42" class="lbl" font-size="18" font-weight="700" fill="#2f5d3a">“台帳”は、育てるもの</text>
  <text x="24" y="64" class="lbl" font-size="12.5" fill="#4a8c3f">入れた分だけ、AIは現場にくわしくなる</text>

  <!-- 幹と枝 -->
  <path d="M320 296 V150" fill="none" stroke="#4a8c3f" stroke-width="4" stroke-linecap="round"/>
  <path d="M320 258 C280 248 232 226 204 200" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round"/>
  <path d="M320 258 C360 248 408 226 436 200" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round"/>

  <!-- 葉のカード：左（事業所の台帳） -->
  <rect x="76" y="140" width="160" height="60" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
  <g transform="translate(94,156)">
    <rect x="0" y="0" width="16" height="20" rx="2.5" fill="#4a8c3f"/>
    <rect x="3" y="0" width="2.2" height="20" fill="#2f5d3a"/>
    <line x1="8" y1="6" x2="13" y2="6" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="8" y1="11" x2="13" y2="11" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="13" y2="16" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="122" y="166" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">事業所の台帳</text>
  <text x="122" y="186" class="lbl" font-size="11" fill="#7c7360">住所・定員・加算など</text>

  <!-- 葉のカード：中央上（現場の実感） -->
  <rect x="240" y="88" width="160" height="60" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
  <g transform="translate(258,104)">
    <rect x="0" y="0" width="20" height="14" rx="5" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="1.8"/>
    <path d="M6 14 l-1 6 7 -6" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M10 4.5 c1.4 -2.4 4.8 -1 4.8 1.2 c0 1.8 -2.8 3.6 -4.8 4.8 c-2 -1.2 -4.8 -3 -4.8 -4.8 c0 -2.2 3.4 -3.6 4.8 -1.2 Z" fill="#d97757"/>
  </g>
  <text x="288" y="114" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">現場の実感</text>
  <text x="288" y="134" class="lbl" font-size="11" fill="#7c7360">口コミ・受入れの実際</text>

  <!-- 葉のカード：右（失敗のメモ） -->
  <rect x="404" y="140" width="160" height="60" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
  <g transform="translate(422,154)">
    <rect x="0" y="0" width="22" height="26" rx="3" fill="#faf6ef" stroke="#4a8c3f" stroke-width="1.8"/>
    <line x1="5" y1="7" x2="17" y2="7" stroke="#4a8c3f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="13" x2="17" y2="13" stroke="#4a8c3f" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 19 l4 4 M8 19 l-4 4" stroke="#d97757" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M12 21 l2.5 2.5 4.5 -5" fill="none" stroke="#4a8c3f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="454" y="166" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">失敗のメモ</text>
  <text x="454" y="186" class="lbl" font-size="11" fill="#7c7360">切れたリンクも財産</text>

  <!-- 鉢 -->
  <rect x="278" y="290" width="84" height="12" rx="4" fill="#b85f41"/>
  <path d="M286 302 h68 l-8 34 h-52 Z" fill="#d97757"/>

  <!-- 地面 -->
  <rect x="60" y="338" width="520" height="6" rx="3" fill="#efe9dd"/>

  <!-- 人（じょうろで水やり） -->
  <g>
    <circle cx="150" cy="252" r="15" fill="#f2d9ae" stroke="#d9c497" stroke-width="1.5"/>
    <circle cx="144.5" cy="249" r="2" fill="#5f5847"/><circle cx="155.5" cy="249" r="2" fill="#5f5847"/>
    <path d="M144 256 Q150 260.5 156 256" fill="none" stroke="#5f5847" stroke-width="1.7" stroke-linecap="round"/>
    <!-- じょうろ -->
    <g transform="translate(174,264) rotate(16)">
      <rect x="0" y="4" width="30" height="20" rx="5" fill="#7c7360"/>
      <path d="M30 8 l16 8" stroke="#7c7360" stroke-width="4" stroke-linecap="round"/>
      <path d="M6 4 a9 9 0 0 1 18 0" fill="none" stroke="#7c7360" stroke-width="3"/>
    </g>
    <!-- しずく -->
    <circle cx="232" cy="296" r="3" fill="#8fe0b0"/>
    <circle cx="244" cy="308" r="3" fill="#8fe0b0"/>
    <circle cx="254" cy="322" r="3" fill="#8fe0b0"/>
  </g>

  <!-- ロボット（新しいカードを差し出す） -->
  <g transform="translate(452,242)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
  </g>
  <g transform="translate(408,282)">
    <rect x="0" y="0" width="34" height="22" rx="4" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
    <line x1="6" y1="7" x2="28" y2="7" stroke="#bcd7b3" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6" y1="14" x2="20" y2="14" stroke="#bcd7b3" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- 締めのピル -->
  <rect x="160" y="362" width="320" height="30" rx="15" fill="#4a8c3f"/>
  <text x="320" y="382" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#ffffff">きょうの記録が、あしたのAIを育てる</text>
</svg>
