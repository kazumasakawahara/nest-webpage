<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="いつもの使い方（聞くと答えてくれる）と、今回の使い方（役を頼むと相手役になってくれる）の対比図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- いつもの使い方 -->
  <rect x="20" y="26" width="276" height="288" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="68" class="lbl" font-size="19" font-weight="700" fill="#7c7360">いつもの使い方</text>
  <text x="48" y="90" class="lbl" font-size="13" fill="#9a907c">聞くと、答えてくれる</text>

  <!-- 自分のふきだし -->
  <g>
    <rect x="60" y="116" width="172" height="36" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
    <text x="146" y="139" text-anchor="middle" class="lbl" font-size="13" fill="#5f5847">クリップボードって何？</text>
    <circle cx="260" cy="134" r="13" fill="#f2d9ae" stroke="#d9c497" stroke-width="1.5"/>
    <circle cx="255.5" cy="131" r="1.8" fill="#5f5847"/><circle cx="264.5" cy="131" r="1.8" fill="#5f5847"/>
    <path d="M255 137 Q260 141 265 137" fill="none" stroke="#5f5847" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- AIのふきだし -->
  <g>
    <g transform="translate(42,172)">
      <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
      <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
      <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
      <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
      <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
    </g>
    <rect x="88" y="170" width="180" height="36" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
    <text x="178" y="193" text-anchor="middle" class="lbl" font-size="13" fill="#5f5847">はい、お答えします！</text>
  </g>

  <text x="158" y="272" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#7c7360">AI ＝ 教えてくれる先生</text>

  <!-- 矢印 -->
  <g transform="translate(300,158)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 今回の使い方 -->
  <rect x="344" y="26" width="276" height="288" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="68" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">今回の使い方</text>
  <text x="372" y="90" class="lbl" font-size="13" fill="#4a8c3f">役を頼むと、“相手役”になってくれる</text>

  <!-- 自分のふきだし -->
  <g>
    <rect x="384" y="112" width="172" height="36" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
    <text x="470" y="135" text-anchor="middle" class="lbl" font-size="13" fill="#264a2c">お母さん役を演じて</text>
    <circle cx="584" cy="130" r="13" fill="#f2d9ae" stroke="#d9c497" stroke-width="1.5"/>
    <circle cx="579.5" cy="127" r="1.8" fill="#5f5847"/><circle cx="588.5" cy="127" r="1.8" fill="#5f5847"/>
    <path d="M579 133 Q584 137 589 133" fill="none" stroke="#5f5847" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- AI（演技中）のふきだし -->
  <g>
    <g transform="translate(366,166)">
      <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
      <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
      <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
      <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
      <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
      <!-- 役者の帽子（ちょこんと） -->
      <path d="M6 6 q12 -10 24 0 l-3 3 q-9 -7 -18 0 Z" fill="#d97757"/>
    </g>
    <rect x="412" y="162" width="184" height="52" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
    <text x="504" y="183" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">（家族役）あの……息子の</text>
    <text x="504" y="201" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">見学をお願いしたくて……</text>
  </g>

  <!-- 講評ピル -->
  <g>
    <rect x="398" y="232" width="196" height="30" rx="15" fill="#4a8c3f"/>
    <text x="496" y="252" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#ffffff">終わったら、講評もしてくれる</text>
  </g>

  <text x="482" y="296" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">AI ＝ 練習の相手役</text>
</svg>
