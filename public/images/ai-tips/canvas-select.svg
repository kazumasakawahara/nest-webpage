<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300" role="img" aria-label="Canvasの文書で、直したい部分をなぞって選び、その部分だけAIに直してもらう様子の図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <filter id="sh3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#102211" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 文書カード -->
  <rect x="12" y="14" width="476" height="182" rx="12" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
  <!-- タイトル -->
  <rect x="32" y="38" width="180" height="12" rx="6" fill="#1f3a26"/>
  <!-- 本文行 -->
  <g fill="#cbc2b0">
    <rect x="32" y="66" width="420" height="9" rx="4.5"/>
    <rect x="32" y="88" width="380" height="9" rx="4.5"/>
  </g>
  <!-- 選択中の行（ハイライト） -->
  <rect x="26" y="106" width="330" height="22" rx="4" fill="#bcd7f0"/>
  <rect x="32" y="112" width="300" height="9" rx="4.5" fill="#2c3a2e"/>
  <!-- 選択ハンドル -->
  <circle cx="26" cy="117" r="5" fill="#4285f4"/>
  <circle cx="356" cy="117" r="5" fill="#4285f4"/>
  <g fill="#cbc2b0">
    <rect x="32" y="140" width="410" height="9" rx="4.5"/>
    <rect x="32" y="162" width="330" height="9" rx="4.5"/>
  </g>

  <!-- ①ラベル -->
  <g transform="translate(372,104)">
    <rect x="0" y="0" width="104" height="26" rx="13" fill="#d97757"/>
    <text x="52" y="18" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#fff">①なぞって選ぶ</text>
  </g>

  <!-- 吹き出しの指し示し -->
  <path d="M150 214 l14 -18 6 12 Z" fill="#ffffff"/>
  <!-- お願いの小窓（②） -->
  <g filter="url(#sh3)">
    <rect x="60" y="214" width="380" height="66" rx="16" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
  </g>
  <!-- ペンのアイコン -->
  <g transform="translate(80,232)">
    <rect x="0" y="4" width="18" height="22" rx="3" fill="#fff" stroke="#2f5d3a" stroke-width="2"/>
    <path d="M12 24 l12 -12 4 4 -12 12 -5 1 1 -5Z" fill="#d97757" stroke="#2f5d3a" stroke-width="1.4"/>
  </g>
  <text x="116" y="243" class="lbl" font-size="11" font-weight="700" fill="#d97757">②選んだ部分だけ、こうお願い</text>
  <text x="116" y="264" class="lbl" font-size="14" fill="#2c3a2e">「この部分を、もっとやさしく直して」</text>
  <!-- 送信 -->
  <circle cx="414" cy="247" r="15" fill="#4a8c3f"/>
  <path d="M414 254 v-14 M408 246 l6 -6 6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
