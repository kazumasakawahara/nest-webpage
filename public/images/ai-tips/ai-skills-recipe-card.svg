<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="スキルのたとえ図。左は毎回口頭でうちの事情を説明する様子、右は厨房にレシピカード（スキル）が置いてあり「いつものお願い」の一言で済む様子の対比">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：スキルなし -->
  <rect x="20" y="26" width="276" height="288" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="68" class="lbl" font-size="19" font-weight="700" fill="#7c7360">スキルなし</text>
  <text x="48" y="90" class="lbl" font-size="12.5" fill="#9a907c">毎回、ゼロから前置き</text>

  <!-- 人 -->
  <g transform="translate(46,112)">
    <circle cx="16" cy="10" r="10" fill="#f2d9ae" stroke="#7c7360" stroke-width="2.2"/>
    <path d="M2 34 a14 14 0 0 1 28 0" fill="#faf6ef" stroke="#7c7360" stroke-width="2.2"/>
  </g>
  <!-- 長い前置きの吹き出し -->
  <rect x="92" y="104" width="192" height="82" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
  <g class="lbl" font-size="11.5" fill="#5f5847">
    <text x="104" y="123">「チラシを作って。うちは</text>
    <text x="104" y="140">福祉事業所で、文字は大きめ、</text>
    <text x="104" y="157">専門用語はなしで、堅すぎ</text>
    <text x="104" y="174">ない感じで、それと……」</text>
  </g>

  <!-- ロボット（聞いている） -->
  <g transform="translate(46,200)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#7c7360" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#7c7360" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#4a443a"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#f2d9ae"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#f2d9ae"/>
  </g>

  <g class="lbl" font-size="13" fill="#5f5847">
    <g><circle cx="106" cy="212" r="4" fill="#b7ac97"/><text x="120" y="217">先週も先月も、同じ説明</text></g>
    <g><circle cx="106" cy="240" r="4" fill="#b7ac97"/><text x="120" y="245">言い忘れると仕上がりが変わる</text></g>
  </g>
  <text x="158" y="290" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#7c7360">毎回、長い前置きから</text>

  <!-- 矢印 -->
  <g transform="translate(300,158)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右：スキルあり -->
  <rect x="344" y="26" width="276" height="288" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="68" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">スキルあり</text>
  <text x="372" y="90" class="lbl" font-size="12.5" fill="#4a8c3f">“うちのやり方”のカードを常備</text>

  <!-- 人（短いお願い） -->
  <g transform="translate(370,106)">
    <circle cx="16" cy="10" r="10" fill="#f2d9ae" stroke="#2f5d3a" stroke-width="2.2"/>
    <path d="M2 34 a14 14 0 0 1 28 0" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
  </g>
  <rect x="424" y="106" width="172" height="36" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
  <text x="510" y="129" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">「チラシ、お願い」</text>

  <!-- ロボット＋レシピカード -->
  <g transform="translate(370,158)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <!-- 手元のレシピカード -->
    <g transform="translate(34,16)">
      <rect x="0" y="0" width="22" height="28" rx="3" fill="#ffffff" stroke="#d97757" stroke-width="2.2"/>
      <line x1="4.5" y1="7" x2="17.5" y2="7" stroke="#d97757" stroke-width="2" stroke-linecap="round"/>
      <line x1="4.5" y1="13" x2="17.5" y2="13" stroke="#e8c0ae" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4.5" y1="18" x2="17.5" y2="18" stroke="#e8c0ae" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4.5" y1="23" x2="13" y2="23" stroke="#e8c0ae" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </g>
  <rect x="440" y="152" width="156" height="52" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
  <text x="518" y="173" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">いつもの調子で</text>
  <text x="518" y="191" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">作りますね</text>

  <g class="lbl" font-size="13" fill="#264a2c" font-weight="600">
    <g><path d="M372 227 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="394" y="237">前置きなしの一言でOK</text></g>
    <g><path d="M372 253 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="394" y="263">誰が頼んでも、同じ品質</text></g>
  </g>
  <text x="482" y="296" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">カード1枚で「いつものお願い」</text>
</svg>
