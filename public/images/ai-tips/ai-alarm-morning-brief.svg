<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="目覚まし時計の図。左：これまでは人がAIを毎回呼びに行っていた。右：一度「毎週月曜8時に」と頼んでおくと、以後はAIが目覚まし時計で自分で起きて働き、月曜の朝には予定の要約とニュースのまとめが先に届いている">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：呼びに行く毎日 -->
  <rect x="20" y="26" width="276" height="288" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="66" class="lbl" font-size="19" font-weight="700" fill="#7c7360">これまで</text>
  <text x="48" y="88" class="lbl" font-size="12.5" fill="#9a907c">毎回、こちらから呼びに行く</text>

  <g transform="translate(48,112)">
    <circle cx="16" cy="10" r="10" fill="#f2d9ae" stroke="#7c7360" stroke-width="2.2"/>
    <path d="M2 34 a14 14 0 0 1 28 0" fill="#faf6ef" stroke="#7c7360" stroke-width="2.2"/>
  </g>
  <rect x="94" y="106" width="152" height="36" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
  <text x="170" y="129" text-anchor="middle" class="lbl" font-size="12" fill="#5f5847">「今日の予定は？」</text>

  <!-- 歩いて呼びに行く点線 -->
  <path d="M80 160 C 110 176, 150 180, 186 186" fill="none" stroke="#b7ac97" stroke-width="2.5" stroke-dasharray="5 5"/>

  <g transform="translate(196,176)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#7c7360" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#7c7360" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#4a443a"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#f2d9ae"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#f2d9ae"/>
  </g>

  <g class="lbl" font-size="13" fill="#5f5847">
    <g><circle cx="52" cy="238" r="4" fill="#b7ac97"/><text x="66" y="243">毎朝・毎週、同じお願い</text></g>
    <g><circle cx="52" cy="264" r="4" fill="#b7ac97"/><text x="66" y="269">忙しい日は、頼み忘れる</text></g>
  </g>
  <text x="158" y="298" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#7c7360">呼べば来る相棒</text>

  <!-- 矢印 -->
  <g transform="translate(300,158)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右：届いている朝 -->
  <rect x="344" y="26" width="276" height="288" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="66" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">これから</text>
  <text x="372" y="88" class="lbl" font-size="12.5" fill="#4a8c3f">一度頼めば、自分で起きて働く</text>

  <!-- 目覚まし時計を持ったロボット -->
  <g transform="translate(372,110)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <!-- 目覚まし時計 -->
    <g transform="translate(38,4)">
      <circle cx="14" cy="16" r="13" fill="#ffffff" stroke="#d97757" stroke-width="2.6"/>
      <line x1="14" y1="16" x2="14" y2="8" stroke="#d97757" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="14" y1="16" x2="20" y2="18" stroke="#d97757" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="4" y1="5" x2="7" y2="8" stroke="#d97757" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="24" y1="5" x2="21" y2="8" stroke="#d97757" stroke-width="2.4" stroke-linecap="round"/>
      <text x="14" y="42" text-anchor="middle" class="lbl" font-size="9" fill="#b05a3e">月曜 8:00</text>
    </g>
  </g>

  <!-- 届いているまとめ -->
  <g transform="translate(460,110)">
    <rect x="0" y="0" width="128" height="76" rx="8" fill="#ffffff" stroke="#bcd7b3" stroke-width="2"/>
    <text x="12" y="20" class="lbl" font-size="10.5" font-weight="700" fill="#2f5d3a">今週のまとめ（自動）</text>
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 32 l3.5 3.5 6 -7" fill="none" stroke="#4a8c3f" stroke-width="2.2"/>
      <line x1="30" y1="31" x2="112" y2="31" stroke="#ddd3c1" stroke-width="2.4"/>
      <path d="M14 48 l3.5 3.5 6 -7" fill="none" stroke="#4a8c3f" stroke-width="2.2"/>
      <line x1="30" y1="47" x2="102" y2="47" stroke="#ddd3c1" stroke-width="2.4"/>
      <path d="M14 64 l3.5 3.5 6 -7" fill="none" stroke="#4a8c3f" stroke-width="2.2"/>
      <line x1="30" y1="63" x2="94" y2="63" stroke="#ddd3c1" stroke-width="2.4"/>
    </g>
  </g>
  <text x="524" y="204" text-anchor="middle" class="lbl" font-size="10.5" fill="#4a8c3f">予定・ニュース、届いてます</text>

  <g class="lbl" font-size="13" fill="#264a2c" font-weight="600">
    <g><path d="M374 231 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="396" y="241">頼むのは、最初の一度だけ</text></g>
    <g><path d="M374 257 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="396" y="267">月曜の朝には、もう届いている</text></g>
  </g>
  <text x="482" y="298" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">毎朝出勤してくる同僚</text>
</svg>
