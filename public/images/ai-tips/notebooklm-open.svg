<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300" role="img" aria-label="ブラウザでnotebooklm.google.comを開き、Googleアカウントでログインする画面のイメージ">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#102211" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- ブラウザ枠 -->
  <rect x="16" y="16" width="528" height="268" rx="16" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5" filter="url(#sh)"/>
  <!-- タイトルバー -->
  <path d="M16 32 a16 16 0 0 1 16 -16 H528 a16 16 0 0 1 16 16 V50 H16 Z" fill="#f3ead9"/>
  <circle cx="40" cy="33" r="6" fill="#e0685a"/>
  <circle cx="60" cy="33" r="6" fill="#e8b64b"/>
  <circle cx="80" cy="33" r="6" fill="#5aa85a"/>
  <!-- アドレスバー -->
  <rect x="112" y="23" width="400" height="22" rx="11" fill="#fbf8f1" stroke="#e3d8c4"/>
  <path d="M126 30 v-2 a4 4 0 0 1 8 0 v2 M124 30 h12 v8 h-12 Z" fill="none" stroke="#8a8073" stroke-width="1.4"/>
  <text x="146" y="38" class="lbl" font-size="12.5" fill="#5f5847">notebooklm.google.com</text>

  <!-- 本文：ログイン画面イメージ -->
  <g transform="translate(0,66)">
    <text x="280" y="60" text-anchor="middle" class="lbl" font-size="26" font-weight="700" fill="#1f3a26">NotebookLM</text>
    <text x="280" y="88" text-anchor="middle" class="lbl" font-size="13" fill="#8a8073">Google の無料AIツール</text>

    <!-- ログインボタン -->
    <g transform="translate(180,116)">
      <rect x="0" y="0" width="200" height="46" rx="23" fill="#4a8c3f"/>
      <circle cx="30" cy="23" r="12" fill="#ffffff"/>
      <text x="30" y="28" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#4285f4">G</text>
      <text x="118" y="28" text-anchor="middle" class="lbl" font-size="14.5" font-weight="700" fill="#ffffff">Google でログイン</text>
    </g>
    <text x="280" y="188" text-anchor="middle" class="lbl" font-size="11.5" fill="#a99f8c">お手持ちのGoogle（Gmail）アカウントでOK</text>
  </g>
</svg>
