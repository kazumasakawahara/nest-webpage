<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 360" width="420" height="360" role="img" aria-label="Windowsのクリップボード履歴の画面イメージ。コピーした内容が一覧で並び、上の項目はピン留めされている">
  <defs>
    <style>
      .lbl { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    </style>
    <filter id="shadowW" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#102211" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- パネル -->
  <rect x="24" y="18" width="372" height="324" rx="20" fill="#faf6ef" stroke="#e3d8c4" stroke-width="1.5" filter="url(#shadowW)"/>

  <!-- ヘッダー -->
  <g transform="translate(48,46)">
    <!-- クリップボードのアイコン -->
    <rect x="0" y="2" width="26" height="32" rx="5" fill="#fff" stroke="#4a8c3f" stroke-width="2.5"/>
    <rect x="7" y="-4" width="12" height="9" rx="3" fill="#4a8c3f"/>
    <text x="38" y="24" class="lbl" font-size="17" font-weight="700" fill="#102211">クリップボードの履歴</text>
  </g>

  <!-- 履歴の一覧 -->
  <!-- 項目1（ピン留め・強調） -->
  <g transform="translate(44,92)">
    <rect x="0" y="0" width="332" height="66" rx="12" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
    <rect x="18" y="18" width="220" height="10" rx="5" fill="#3a4a3c"/>
    <rect x="18" y="38" width="150" height="9" rx="4.5" fill="#c3b9a6"/>
    <!-- ピン -->
    <g transform="translate(300,20) rotate(35)">
      <rect x="-4" y="-10" width="8" height="16" rx="2" fill="#d97757"/>
      <circle cx="0" cy="-12" r="6" fill="#d97757"/>
      <line x1="0" y1="6" x2="0" y2="18" stroke="#d97757" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 項目2 -->
  <g transform="translate(44,168)">
    <rect x="0" y="0" width="332" height="66" rx="12" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
    <rect x="18" y="18" width="270" height="10" rx="5" fill="#3a4a3c"/>
    <rect x="18" y="38" width="120" height="9" rx="4.5" fill="#c3b9a6"/>
  </g>

  <!-- 項目3（スクショ・画像） -->
  <g transform="translate(44,244)">
    <rect x="0" y="0" width="332" height="66" rx="12" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
    <!-- 画像サムネイル -->
    <g transform="translate(18,13)">
      <rect x="0" y="0" width="54" height="40" rx="6" fill="#dceccf" stroke="#4a8c3f" stroke-width="1.5"/>
      <circle cx="16" cy="14" r="6" fill="#f0c05a"/>
      <path d="M4 34 L20 20 L30 28 L40 16 L50 34 Z" fill="#4a8c3f"/>
    </g>
    <rect x="86" y="20" width="130" height="10" rx="5" fill="#3a4a3c"/>
    <rect x="86" y="40" width="90" height="9" rx="4.5" fill="#c3b9a6"/>
  </g>
</svg>
