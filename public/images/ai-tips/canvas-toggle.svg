<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220" role="img" aria-label="Geminiの入力欄の図。ツールの中の「Canvas」をオンにする場所を示している">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 入力ボックス -->
  <rect x="28" y="34" width="504" height="104" rx="26" fill="#ffffff" stroke="#e3d8c4" stroke-width="2"/>
  <!-- プレースホルダ -->
  <text x="58" y="72" class="lbl" font-size="16" fill="#a99f8c">Geminiに話しかけてみましょう…</text>

  <!-- ツール行 -->
  <!-- ＋ -->
  <circle cx="70" cy="110" r="15" fill="#f0e6d3"/>
  <path d="M70 102 v16 M62 110 h16" stroke="#6f766d" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Canvas チップ（ハイライト） -->
  <g>
    <rect x="98" y="94" width="118" height="32" rx="16" fill="#dceccf" stroke="#4a8c3f" stroke-width="2"/>
    <!-- ドキュメント＋ペンのアイコン -->
    <rect x="112" y="102" width="15" height="18" rx="2.5" fill="#fff" stroke="#2f5d3a" stroke-width="2"/>
    <path d="M122 118 l10 -10 3 3 -10 10 -4 1 1 -4Z" fill="#d97757" stroke="#2f5d3a" stroke-width="1.2"/>
    <text x="140" y="115" class="lbl" font-size="15" font-weight="700" fill="#1f3a26">Canvas</text>
  </g>
  <!-- 強調の破線 -->
  <rect x="92" y="88" width="130" height="44" rx="20" fill="none" stroke="#d97757" stroke-width="2.5" stroke-dasharray="6 6"/>

  <!-- 送信ボタン -->
  <circle cx="502" cy="110" r="17" fill="#4a8c3f"/>
  <path d="M502 118 v-16 M495 108 l7 -7 7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 吹き出しの案内 -->
  <path d="M157 150 l-8 20 20 -8" fill="none" stroke="#d97757" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="150" y="176" width="270" height="34" rx="17" fill="#d97757"/>
  <text x="285" y="198" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#fff">① まず「Canvas」をオンにする</text>
</svg>
