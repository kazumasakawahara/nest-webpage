<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="これまで（別の部屋にいるAIへ、コピーして持って行って貼り付ける往復）と、これから（ブラウザに住み込んだAIと同じ画面を一緒に見る）の対比図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：これまで -->
  <rect x="20" y="26" width="276" height="288" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="68" class="lbl" font-size="19" font-weight="700" fill="#7c7360">これまで</text>
  <text x="48" y="90" class="lbl" font-size="12.5" fill="#9a907c">AIは“別の部屋”にいる</text>

  <!-- ブラウザ（小） -->
  <g transform="translate(44,112)">
    <rect x="0" y="0" width="104" height="78" rx="8" fill="#ffffff" stroke="#b7ac97" stroke-width="1.6"/>
    <rect x="0" y="0" width="104" height="16" rx="8" fill="#e6dfcf"/>
    <rect x="0" y="8" width="104" height="8" fill="#e6dfcf"/>
    <circle cx="10" cy="8" r="2.2" fill="#b7ac97"/><circle cx="18" cy="8" r="2.2" fill="#b7ac97"/><circle cx="26" cy="8" r="2.2" fill="#b7ac97"/>
    <line x1="12" y1="30" x2="92" y2="30" stroke="#ddd3c1" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="42" x2="92" y2="42" stroke="#ddd3c1" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="54" x2="72" y2="54" stroke="#ddd3c1" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="66" x2="84" y2="66" stroke="#ddd3c1" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="96" y="206" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">見ているページ</text>

  <!-- チャット（別の部屋） -->
  <g transform="translate(196,112)">
    <rect x="0" y="0" width="76" height="78" rx="8" fill="#ffffff" stroke="#b7ac97" stroke-width="1.6" stroke-dasharray="5 4"/>
    <g transform="translate(22,10)">
      <line x1="16" y1="6" x2="16" y2="2" stroke="#7c7360" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="16" cy="0" r="2.8" fill="#ffd15c"/>
      <rect x="2" y="6" width="28" height="23" rx="7" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
      <rect x="8" y="11" width="16" height="13" rx="4" fill="#4a443a"/>
      <circle cx="13" cy="17.5" r="2.3" fill="#f2d9ae"/>
      <circle cx="19" cy="17.5" r="2.3" fill="#f2d9ae"/>
    </g>
    <line x1="12" y1="48" x2="64" y2="48" stroke="#e6dfcf" stroke-width="3" stroke-linecap="round"/>
    <line x1="12" y1="60" x2="56" y2="60" stroke="#e6dfcf" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="234" y="206" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">チャット画面</text>

  <!-- コピペの往復矢印 -->
  <path d="M152 138 h40 M184 132 l8 6 -8 6" fill="none" stroke="#d97757" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 4"/>
  <path d="M192 168 h-40 M160 162 l-8 6 8 6" fill="none" stroke="#d97757" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 4"/>

  <text x="158" y="234" text-anchor="middle" class="lbl" font-size="12.5" fill="#5f5847">コピーして、持って行って、</text>
  <text x="158" y="252" text-anchor="middle" class="lbl" font-size="12.5" fill="#5f5847">貼り付けて……の往復</text>
  <text x="158" y="290" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#7c7360">AI ＝ 別の部屋の相談役</text>

  <!-- 矢印 -->
  <g transform="translate(300,158)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右：これから -->
  <rect x="344" y="26" width="276" height="288" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="68" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">これから</text>
  <text x="372" y="90" class="lbl" font-size="12.5" fill="#4a8c3f">AIがブラウザに“住み込む”</text>

  <!-- ブラウザ（大・サイドパネルつき） -->
  <g transform="translate(372,112)">
    <rect x="0" y="0" width="220" height="118" rx="8" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.8"/>
    <rect x="0" y="0" width="220" height="16" rx="8" fill="#d8e8d0"/>
    <rect x="0" y="8" width="220" height="8" fill="#d8e8d0"/>
    <circle cx="10" cy="8" r="2.2" fill="#4a8c3f"/><circle cx="18" cy="8" r="2.2" fill="#4a8c3f"/><circle cx="26" cy="8" r="2.2" fill="#4a8c3f"/>
    <!-- ピン留めマーク -->
    <circle cx="206" cy="8" r="5" fill="#d97757"/>
    <path d="M206 4.5 l1 2.4 2.6 .3 -1.9 1.8 .5 2.5 -2.2 -1.3 -2.2 1.3 .5 -2.5 -1.9 -1.8 2.6 -.3 Z" fill="#ffffff"/>
    <!-- ページ本文 -->
    <line x1="14" y1="34" x2="132" y2="34" stroke="#dfe9da" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="50" x2="132" y2="50" stroke="#dfe9da" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="66" x2="112" y2="66" stroke="#dfe9da" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="82" x2="126" y2="82" stroke="#dfe9da" stroke-width="4" stroke-linecap="round"/>
    <line x1="14" y1="98" x2="100" y2="98" stroke="#dfe9da" stroke-width="4" stroke-linecap="round"/>
    <!-- サイドパネル -->
    <rect x="146" y="16" width="74" height="102" fill="#eaf2e5"/>
    <line x1="146" y1="16" x2="146" y2="118" stroke="#bcd7b3" stroke-width="1.5"/>
    <g transform="translate(167,26)">
      <line x1="16" y1="6" x2="16" y2="2" stroke="#2f5d3a" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="16" cy="0" r="2.8" fill="#ffd15c"/>
      <rect x="2" y="6" width="28" height="23" rx="7" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2"/>
      <rect x="8" y="11" width="16" height="13" rx="4" fill="#1f3a26"/>
      <circle cx="13" cy="17.5" r="2.3" fill="#8fe0b0"/>
      <circle cx="19" cy="17.5" r="2.3" fill="#8fe0b0"/>
    </g>
    <line x1="156" y1="68" x2="210" y2="68" stroke="#bcd7b3" stroke-width="3" stroke-linecap="round"/>
    <line x1="156" y1="80" x2="202" y2="80" stroke="#bcd7b3" stroke-width="3" stroke-linecap="round"/>
    <line x1="156" y1="92" x2="206" y2="92" stroke="#bcd7b3" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="482" y="252" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">同じ画面を、隣で一緒に見ながら</text>
  <text x="482" y="270" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">読む・調べる・入力を手伝う</text>
  <text x="482" y="298" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">AI ＝ 同じ画面を見る相棒</text>
</svg>
