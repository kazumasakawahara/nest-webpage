<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300" role="img" aria-label="どこから始めるかの見取り図。ふだん使いのAIがGeminiなら設定でGoogle Workspaceアプリをオンに（個人アカウントは無料でも可）。ClaudeやChatGPTなら設定のコネクタからGmail・Googleカレンダーを接続。共通の注意として、仕事用アカウントにつなぐ前に必ず管理者へ相談し、まずは個人の予定・メールで練習する">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <marker id="arwk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b7ac97"/>
    </marker>
  </defs>

  <rect x="185" y="18" width="270" height="48" rx="24" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="320" y="40" text-anchor="middle" class="lbl" font-size="14.5" font-weight="700" fill="#5f5847">ふだん使いのAIは、どれ？</text>
  <text x="320" y="58" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">開くのは、そのAIの設定画面だけ</text>

  <path d="M250 66 C 220 84, 195 92, 175 104" fill="none" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arwk)"/>
  <path d="M390 66 C 420 84, 445 92, 465 104" fill="none" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arwk)"/>
  <text x="168" y="92" class="lbl" font-size="11.5" font-weight="600" fill="#5f5847">Gemini派</text>
  <text x="408" y="92" class="lbl" font-size="11.5" font-weight="600" fill="#5f5847">Claude・ChatGPT派</text>

  <rect x="36" y="110" width="270" height="98" rx="14" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="2"/>
  <text x="58" y="138" class="lbl" font-size="14.5" font-weight="700" fill="#2f5d3a">設定 →「アプリ」をオン</text>
  <g class="lbl" font-size="11.5" fill="#264a2c">
    <g><path d="M58 152 l4 4 7 -8" fill="none" stroke="#4a8c3f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="76" y="160">Google Workspaceアプリを有効化</text></g>
    <g><path d="M58 174 l4 4 7 -8" fill="none" stroke="#4a8c3f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="76" y="182">個人アカウントなら無料でも可</text></g>
  </g>
  <text x="58" y="200" class="lbl" font-size="10" fill="#4a8c3f">「@Gmail」「@Googleカレンダー」で呼べる</text>

  <rect x="334" y="110" width="270" height="98" rx="14" fill="#fdf3ee" stroke="#d97757" stroke-width="2"/>
  <text x="356" y="138" class="lbl" font-size="14.5" font-weight="700" fill="#b05a3e">設定 →「コネクタ」で接続</text>
  <g class="lbl" font-size="11.5" fill="#6b4534">
    <g><path d="M356 152 l4 4 7 -8" fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="374" y="160">Gmail・Googleカレンダーの鍵を渡す</text></g>
    <g><path d="M356 174 l4 4 7 -8" fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="374" y="182">渡す鍵は選べる・あとで解除できる</text></g>
  </g>
  <text x="356" y="200" class="lbl" font-size="10" fill="#c98a72">設定はパソコン（ブラウザ／デスクトップ版）から</text>

  <!-- 共通の注意 -->
  <rect x="70" y="228" width="500" height="54" rx="14" fill="#fff8e6" stroke="#e8c86a" stroke-width="2"/>
  <text x="94" y="251" class="lbl" font-size="12.5" font-weight="700" fill="#8a6d1f">⚠ どちらの派でも共通の作法</text>
  <text x="94" y="271" class="lbl" font-size="11.5" fill="#8a6d1f">仕事用アカウントは必ず管理者に相談 ／ まずは個人の予定・メールで練習を</text>
</svg>
