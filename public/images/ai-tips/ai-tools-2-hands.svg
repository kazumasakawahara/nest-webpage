<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="素のAI（知識はあるのに手が出せない、電話口の相談員のような存在）と、MCPで“手足”＝道具をつないだAI（自分で情報を取りに行ける相棒）の対比図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：素のAI -->
  <rect x="20" y="26" width="276" height="288" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="68" class="lbl" font-size="19" font-weight="700" fill="#7c7360">素のAI</text>
  <text x="48" y="90" class="lbl" font-size="12.5" fill="#9a907c">知識はあるのに、手が出せない</text>

  <g transform="translate(44,110)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#7c7360" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#7c7360" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#4a443a"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#f2d9ae"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#f2d9ae"/>
  </g>
  <rect x="92" y="108" width="192" height="52" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
  <text x="188" y="129" text-anchor="middle" class="lbl" font-size="12.5" fill="#5f5847">やり方は知っていますよ。</text>
  <text x="188" y="147" text-anchor="middle" class="lbl" font-size="12.5" fill="#5f5847">手順は、こうです……</text>

  <g class="lbl" font-size="13.5" fill="#5f5847">
    <g><circle cx="50" cy="196" r="4" fill="#b7ac97"/><text x="64" y="201">教えてくれるのは、やり方まで</text></g>
    <g><circle cx="50" cy="228" r="4" fill="#b7ac97"/><text x="64" y="233">実際に手を動かすのは、人間</text></g>
  </g>
  <text x="158" y="286" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#7c7360">AI ＝ 電話口の相談員</text>

  <!-- 矢印 -->
  <g transform="translate(300,158)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右：道具を持たせたAI -->
  <rect x="344" y="26" width="276" height="288" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="68" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">道具を持たせたAI</text>
  <text x="372" y="90" class="lbl" font-size="12.5" fill="#4a8c3f">MCPで“手足”をつないだ状態</text>

  <g transform="translate(368,110)">
    <line x1="18" y1="7" x2="18" y2="2" stroke="#2f5d3a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="0" r="3.2" fill="#ffd15c"/>
    <rect x="2" y="7" width="32" height="26" rx="8" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2.2"/>
    <rect x="9" y="13" width="18" height="14" rx="4.5" fill="#1f3a26"/>
    <circle cx="14.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <circle cx="21.5" cy="20" r="2.6" fill="#8fe0b0"/>
    <!-- 道具箱 -->
    <g transform="translate(-8,40)">
      <rect x="0" y="4" width="26" height="14" rx="3" fill="#d97757"/>
      <path d="M8 4 v-3 h10 v3" fill="none" stroke="#d97757" stroke-width="2.4"/>
      <rect x="10.5" y="8" width="5" height="4" rx="1" fill="#ffffff"/>
    </g>
    <!-- 台帳 -->
    <g transform="translate(26,40)">
      <rect x="0" y="0" width="16" height="18" rx="2" fill="#4a8c3f"/>
      <rect x="3" y="0" width="2" height="18" fill="#2f5d3a"/>
      <line x1="8" y1="5" x2="13" y2="5" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="8" y1="9" x2="13" y2="9" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="8" y1="13" x2="13" y2="13" stroke="#eaf2e5" stroke-width="1.6" stroke-linecap="round"/>
    </g>
  </g>
  <rect x="424" y="108" width="172" height="52" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
  <text x="510" y="129" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">では、私が</text>
  <text x="510" y="147" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">取ってきますね</text>

  <g class="lbl" font-size="13.5" fill="#264a2c" font-weight="600">
    <g><path d="M370 191 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="392" y="201">自分で情報を取りに行ける</text></g>
    <g><path d="M370 223 l5 5 9 -10" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="392" y="233">ファイルや台帳も扱える</text></g>
  </g>
  <text x="482" y="286" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">AI ＝ 自分で動ける相棒</text>
</svg>
