<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 280" width="470" height="280" role="img" aria-label="AIがレシートから作った表の例。日付・店名・品目・金額の列に3行のデータと合計行が並ぶ">
  <defs>
    <style>.cell{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;font-size:14px;}</style>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#102211" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="10" y="14" width="450" height="252" rx="14" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5" filter="url(#sh)"/>

  <!-- 列位置: 日付 10-96 / 店名 96-250 / 品目 250-350 / 金額 350-460 -->
  <!-- ヘッダ -->
  <rect x="10" y="14" width="450" height="46" rx="14" fill="#4a8c3f"/>
  <rect x="10" y="40" width="450" height="20" fill="#4a8c3f"/>
  <g class="cell" fill="#ffffff" font-weight="700">
    <text x="26" y="44">日付</text>
    <text x="112" y="44">店名</text>
    <text x="266" y="44">品目</text>
    <text x="444" y="44" text-anchor="end">金額</text>
  </g>

  <!-- 行 -->
  <g class="cell" fill="#2c3a2e">
    <text x="26" y="90">7/1</text><text x="112" y="90">◯◯商店</text><text x="266" y="90">文具</text><text x="444" y="90" text-anchor="end">¥1,280</text>
    <text x="26" y="130">7/3</text><text x="112" y="130">△△スーパー</text><text x="266" y="130">食材</text><text x="444" y="130" text-anchor="end">¥3,450</text>
    <text x="26" y="170">7/5</text><text x="112" y="170">□□薬局</text><text x="266" y="170">日用品</text><text x="444" y="170" text-anchor="end">¥890</text>
  </g>

  <!-- 合計 -->
  <rect x="10" y="188" width="450" height="46" fill="#f3ead9"/>
  <g class="cell" font-weight="700" fill="#1f3a26">
    <text x="26" y="216">合計</text>
    <text x="444" y="216" text-anchor="end">¥5,620</text>
  </g>

  <!-- 罫線 -->
  <g stroke="#eee6d6" stroke-width="1.5">
    <line x1="10" y1="106" x2="460" y2="106"/>
    <line x1="10" y1="146" x2="460" y2="146"/>
    <line x1="10" y1="188" x2="460" y2="188"/>
  </g>
  <g stroke="#f0e8d8" stroke-width="1.5">
    <line x1="96" y1="60" x2="96" y2="234"/>
    <line x1="250" y1="60" x2="250" y2="234"/>
    <line x1="350" y1="60" x2="350" y2="234"/>
  </g>
</svg>
