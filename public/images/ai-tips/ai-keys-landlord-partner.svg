<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-label="家主と合鍵の対比図。左：Geminiはもともと家主。GmailもGoogleカレンダーも同じGoogleの家の中にあるので、鍵を渡すまでもなく中が見えている。右：ClaudeとChatGPTは合鍵を渡された相棒。コネクタという合鍵を受け取って、GmailやGoogleカレンダーの中を見せてもらう。どの鍵を渡すかは自分で選べる">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：家主 Gemini -->
  <rect x="20" y="26" width="290" height="288" rx="16" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
  <text x="46" y="66" class="lbl" font-size="19" font-weight="700" fill="#2f5d3a">もともと家主</text>
  <text x="46" y="88" class="lbl" font-size="12.5" fill="#4a8c3f">同じGoogleの家に住んでいる</text>

  <g transform="translate(70,104)">
    <path d="M-14 40 L95 -8 L204 40" fill="none" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="0" y="40" width="190" height="100" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
    <rect x="14" y="56" width="70" height="52" rx="6" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
    <path d="M24 68 h50 v30 h-50 z M24 68 l25 16 25 -16" fill="none" stroke="#4a8c3f" stroke-width="2" stroke-linejoin="round"/>
    <text x="49" y="121" text-anchor="middle" class="lbl" font-size="9.5" fill="#2f5d3a">メール</text>
    <rect x="106" y="56" width="70" height="52" rx="6" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.5"/>
    <rect x="118" y="66" width="46" height="34" rx="4" fill="none" stroke="#4a8c3f" stroke-width="2"/>
    <line x1="118" y1="76" x2="164" y2="76" stroke="#4a8c3f" stroke-width="2"/>
    <line x1="127" y1="62" x2="127" y2="70" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="62" x2="155" y2="70" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <text x="141" y="121" text-anchor="middle" class="lbl" font-size="9.5" fill="#2f5d3a">カレンダー</text>
    <g transform="translate(81,114)">
      <line x1="14" y1="6" x2="14" y2="2" stroke="#2f5d3a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="0" r="2.6" fill="#ffd15c"/>
      <rect x="1.5" y="6" width="25" height="20" rx="6.5" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2"/>
      <rect x="7" y="10.5" width="14" height="11" rx="3.6" fill="#1f3a26"/>
      <circle cx="11" cy="16" r="2" fill="#8fe0b0"/>
      <circle cx="17" cy="16" r="2" fill="#8fe0b0"/>
    </g>
  </g>

  <text x="46" y="278" class="lbl" font-size="12.5" fill="#264a2c">設定でオンにするだけで、中が見える</text>
  <text x="165" y="300" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#2f5d3a">Gemini</text>

  <!-- 右：合鍵の相棒 -->
  <rect x="330" y="26" width="290" height="288" rx="16" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
  <text x="356" y="66" class="lbl" font-size="19" font-weight="700" fill="#b05a3e">合鍵を受け取る相棒</text>
  <text x="356" y="88" class="lbl" font-size="12.5" fill="#c98a72">コネクタ＝渡す鍵を自分で選ぶ</text>

  <g transform="translate(356,108)">
    <path d="M-8 26 L52 -4 L112 26" fill="none" stroke="#7c7360" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="0" y="26" width="104" height="66" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
    <path d="M18 44 h28 v18 h-28 z M18 44 l14 9 14 -9" fill="none" stroke="#7c7360" stroke-width="1.8" stroke-linejoin="round"/>
    <rect x="60" y="42" width="28" height="22" rx="3" fill="none" stroke="#7c7360" stroke-width="1.8"/>
    <line x1="60" y1="48" x2="88" y2="48" stroke="#7c7360" stroke-width="1.8"/>
    <rect x="40" y="66" width="24" height="26" rx="2" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
    <circle cx="58" cy="80" r="2.2" fill="#7c7360"/>
  </g>

  <g transform="translate(488,118)" stroke="#d97757" stroke-width="3.4" fill="none" stroke-linecap="round">
    <circle cx="14" cy="14" r="11"/>
    <line x1="23" y1="23" x2="52" y2="52"/>
    <line x1="42" y1="42" x2="34" y2="50"/>
    <line x1="52" y1="52" x2="44" y2="60"/>
  </g>
  <text x="540" y="200" text-anchor="middle" class="lbl" font-size="10.5" fill="#6b4534">合鍵は返して</text>
  <text x="540" y="214" text-anchor="middle" class="lbl" font-size="10.5" fill="#6b4534">もらえる</text>

  <g transform="translate(374,216)">
    <line x1="14" y1="6" x2="14" y2="2" stroke="#b05a3e" stroke-width="2" stroke-linecap="round"/>
    <circle cx="14" cy="0" r="2.6" fill="#ffd15c"/>
    <rect x="1.5" y="6" width="25" height="20" rx="6.5" fill="#faf6ef" stroke="#b05a3e" stroke-width="2"/>
    <rect x="7" y="10.5" width="14" height="11" rx="3.6" fill="#4a3227"/>
    <circle cx="11" cy="16" r="2" fill="#f6c3ad"/>
    <circle cx="17" cy="16" r="2" fill="#f6c3ad"/>
    <text x="14" y="46" text-anchor="middle" class="lbl" font-size="10.5" font-weight="700" fill="#b05a3e">Claude</text>
  </g>
  <g transform="translate(450,216)">
    <line x1="14" y1="6" x2="14" y2="2" stroke="#7c7360" stroke-width="2" stroke-linecap="round"/>
    <circle cx="14" cy="0" r="2.6" fill="#ffd15c"/>
    <rect x="1.5" y="6" width="25" height="20" rx="6.5" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
    <rect x="7" y="10.5" width="14" height="11" rx="3.6" fill="#4a443a"/>
    <circle cx="11" cy="16" r="2" fill="#f2d9ae"/>
    <circle cx="17" cy="16" r="2" fill="#f2d9ae"/>
    <text x="14" y="46" text-anchor="middle" class="lbl" font-size="10.5" font-weight="700" fill="#5f5847">ChatGPT</text>
  </g>

  <text x="475" y="300" text-anchor="middle" class="lbl" font-size="12.5" fill="#6b4534">Gmail・カレンダーの鍵を、選んで渡す</text>
</svg>
