<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" width="640" height="310" role="img" aria-label="知りたいこと（行動障害のある方を受け入れられるか）はどこにも公表されていないため、代わりに“足あと”＝重度障害者支援加算の届出を見る、という代理指標の考え方の図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- 左：知りたいこと -->
  <rect x="20" y="26" width="276" height="222" rx="16" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="48" y="66" class="lbl" font-size="17" font-weight="700" fill="#7c7360">知りたいこと</text>

  <rect x="44" y="86" width="228" height="64" rx="12" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.2"/>
  <text x="158" y="112" text-anchor="middle" class="lbl" font-size="13" fill="#5f5847">行動障害のある方を</text>
  <text x="158" y="132" text-anchor="middle" class="lbl" font-size="13" fill="#5f5847">受け入れてもらえる？</text>

  <rect x="44" y="166" width="228" height="50" rx="12" fill="#e6dfcf" stroke="#c9bda4" stroke-width="1.4" stroke-dasharray="5 4"/>
  <g transform="translate(62,180)">
    <rect x="0" y="8" width="16" height="12" rx="2.5" fill="#9a907c"/>
    <path d="M3 8 v-3 a5 5 0 0 1 10 0 v3" fill="none" stroke="#9a907c" stroke-width="2.4"/>
  </g>
  <text x="164" y="196" text-anchor="middle" class="lbl" font-size="12.5" fill="#7c7360">どこにも公表されていない</text>

  <!-- 矢印 -->
  <g transform="translate(300,122)">
    <circle cx="20" cy="12" r="22" fill="#d97757"/>
    <path d="M12 12 h14 M20 4 l10 8 -10 8" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右：代わりに見る足あと -->
  <rect x="344" y="26" width="276" height="222" rx="16" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <text x="372" y="66" class="lbl" font-size="17" font-weight="700" fill="#2f5d3a">代わりに見る、“足あと”</text>

  <rect x="368" y="86" width="228" height="76" rx="12" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.2"/>
  <g transform="translate(388,104)">
    <rect x="0" y="0" width="28" height="38" rx="3" fill="#faf6ef" stroke="#4a8c3f" stroke-width="2"/>
    <line x1="6" y1="9" x2="22" y2="9" stroke="#4a8c3f" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="22" y2="16" stroke="#4a8c3f" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="6" y1="23" x2="16" y2="23" stroke="#4a8c3f" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="21" cy="30" r="7" fill="#d97757"/>
    <path d="M17.5 30 l2.5 2.5 4.5 -5" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="434" y="116" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">重度障害者支援加算の</text>
  <text x="434" y="136" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">届出があるか</text>

  <text x="482" y="192" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">＝ 専門の研修を修了した職員を</text>
  <text x="482" y="212" text-anchor="middle" class="lbl" font-size="12.5" fill="#264a2c">置いている“体制”のしるし</text>

  <!-- 締めのピル -->
  <rect x="132" y="266" width="376" height="32" rx="16" fill="#d97757"/>
  <text x="320" y="287" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#ffffff">直接見えないことには、“代理の指標”で近づく</text>
</svg>
