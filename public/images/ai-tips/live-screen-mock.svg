<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 520" width="360" height="520" role="img" aria-label="Gemini Liveの画面イメージ。カメラに複合機の操作パネルが映り、下に音声会話中の波形とカメラ・画面共有のボタンが並ぶ">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- スマホ本体 -->
  <rect x="40" y="14" width="280" height="492" rx="34" fill="#2b3a2c"/>
  <rect x="52" y="26" width="256" height="468" rx="24" fill="#101b12"/>

  <!-- カメラ映像（複合機の操作パネル） -->
  <g>
    <rect x="52" y="26" width="256" height="330" rx="24" fill="#33413a"/>
    <rect x="52" y="200" width="256" height="156" fill="#33413a"/>
    <!-- 複合機 -->
    <rect x="92" y="96" width="176" height="160" rx="12" fill="#b7ac97"/>
    <rect x="108" y="70" width="144" height="34" rx="8" fill="#9a907c"/>
    <!-- パネル -->
    <rect x="112" y="120" width="82" height="44" rx="6" fill="#faf6ef"/>
    <text x="153" y="140" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#c0492c">エラー E-04</text>
    <text x="153" y="156" text-anchor="middle" class="lbl" font-size="9" fill="#5f5847">用紙を確認してください</text>
    <!-- ボタン -->
    <g fill="#8b8271">
      <rect x="206" y="120" width="22" height="18" rx="4"/>
      <rect x="234" y="120" width="22" height="18" rx="4"/>
      <rect x="206" y="146" width="22" height="18" rx="4"/>
      <rect x="234" y="146" width="22" height="18" rx="4"/>
    </g>
    <!-- 緑のレバー（AIが案内している場所） -->
    <rect x="118" y="196" width="52" height="16" rx="8" fill="#4a8c3f"/>
    <circle cx="144" cy="204" r="26" fill="none" stroke="#ffd15c" stroke-width="4" stroke-dasharray="6 5"/>
  </g>

  <!-- AIの字幕ふきだし -->
  <g>
    <rect x="68" y="288" width="224" height="52" rx="14" fill="#0d150e" opacity="0.86"/>
    <text x="180" y="310" text-anchor="middle" class="lbl" font-size="12.5" fill="#e9f4e6">紙づまりですね。いま映っている</text>
    <text x="180" y="328" text-anchor="middle" class="lbl" font-size="12.5" fill="#e9f4e6">緑のレバーを手前に起こしてください</text>
  </g>

  <!-- 下部：会話中の波形 -->
  <g>
    <rect x="52" y="356" width="256" height="138" rx="0" fill="#101b12"/>
    <g stroke="#8fe0b0" stroke-width="5" stroke-linecap="round">
      <line x1="140" y1="388" x2="140" y2="404"/>
      <line x1="156" y1="380" x2="156" y2="412"/>
      <line x1="172" y1="372" x2="172" y2="420"/>
      <line x1="188" y1="380" x2="188" y2="412"/>
      <line x1="204" y1="386" x2="204" y2="406"/>
      <line x1="220" y1="390" x2="220" y2="402"/>
    </g>
    <!-- 操作ボタン列 -->
    <g>
      <!-- カメラ（オン） -->
      <circle cx="116" cy="454" r="24" fill="#4a8c3f"/>
      <rect x="104" y="446" width="18" height="14" rx="3.5" fill="#ffffff"/>
      <path d="M122 450 l8 -4 v14 l-8 -4 Z" fill="#ffffff"/>
      <!-- 画面共有 -->
      <circle cx="180" cy="454" r="24" fill="#22301f"/>
      <rect x="169" y="444" width="22" height="16" rx="3" fill="none" stroke="#cfe6c8" stroke-width="2.5"/>
      <path d="M180 462 v6 M173 468 h14" stroke="#cfe6c8" stroke-width="2.5" stroke-linecap="round"/>
      <!-- 終了 -->
      <circle cx="244" cy="454" r="24" fill="#c0492c"/>
      <path d="M235 454 h18 M244 445 v18" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" transform="rotate(45 244 454)"/>
    </g>
    <g class="lbl" font-size="9.5" fill="#9db89a" text-anchor="middle">
      <text x="116" y="488">カメラ</text>
      <text x="180" y="488">画面を共有</text>
      <text x="244" y="488">終了</text>
    </g>
  </g>
</svg>
