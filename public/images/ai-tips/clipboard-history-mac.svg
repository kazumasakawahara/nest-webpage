<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 330" width="440" height="330" role="img" aria-label="MacのSpotlightクリップボード履歴の画面イメージ。検索バーの下にコピーした文章やスクショがカードで並ぶ">
  <defs>
    <style>
      .lbl { font-family: system-ui, -apple-system, "SF Pro", sans-serif; }
    </style>
    <filter id="shadowM" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#102211" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Spotlight 検索バー -->
  <g filter="url(#shadowM)">
    <rect x="30" y="24" width="380" height="60" rx="18" fill="#faf6ef" stroke="#e3d8c4" stroke-width="1.5"/>
  </g>
  <!-- 虫めがね -->
  <g transform="translate(58,54)" stroke="#7c8a76" stroke-width="3" fill="none">
    <circle cx="0" cy="0" r="9"/>
    <line x1="7" y1="7" x2="15" y2="15" stroke-linecap="round"/>
  </g>
  <text x="90" y="60" class="lbl" font-size="15" fill="#a99f8c">クリップボード</text>
  <!-- ⌘4 のヒント（右のクリップボードアイコン） -->
  <g transform="translate(348,40)">
    <rect x="0" y="0" width="30" height="28" rx="7" fill="#4a8c3f"/>
    <rect x="9" y="7" width="12" height="15" rx="2.5" fill="#fff"/>
    <rect x="12" y="4" width="6" height="5" rx="1.5" fill="#dceccf"/>
  </g>

  <!-- 結果パネル -->
  <g filter="url(#shadowM)">
    <rect x="30" y="98" width="380" height="200" rx="18" fill="#faf6ef" stroke="#e3d8c4" stroke-width="1.5"/>
  </g>

  <!-- カード1（文章） -->
  <g transform="translate(50,120)">
    <rect x="0" y="0" width="108" height="156" rx="12" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
    <rect x="14" y="18" width="80" height="8" rx="4" fill="#3a4a3c"/>
    <rect x="14" y="34" width="80" height="8" rx="4" fill="#c3b9a6"/>
    <rect x="14" y="50" width="58" height="8" rx="4" fill="#c3b9a6"/>
    <rect x="14" y="132" width="46" height="8" rx="4" fill="#a99f8c"/>
  </g>

  <!-- カード2（文章） -->
  <g transform="translate(166,120)">
    <rect x="0" y="0" width="108" height="156" rx="12" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
    <rect x="14" y="18" width="80" height="8" rx="4" fill="#3a4a3c"/>
    <rect x="14" y="34" width="66" height="8" rx="4" fill="#c3b9a6"/>
    <rect x="14" y="132" width="46" height="8" rx="4" fill="#a99f8c"/>
  </g>

  <!-- カード3（スクショ・画像） -->
  <g transform="translate(282,120)">
    <rect x="0" y="0" width="108" height="156" rx="12" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
    <!-- 画像プレビュー -->
    <rect x="14" y="16" width="80" height="90" rx="8" fill="#dceccf" stroke="#4a8c3f" stroke-width="1.5"/>
    <circle cx="38" cy="42" r="9" fill="#f0c05a"/>
    <path d="M20 100 L46 66 L64 84 L78 62 L88 100 Z" fill="#4a8c3f"/>
    <text x="14" y="128" class="lbl" font-size="10" fill="#7c8a76">スクショ.png</text>
    <rect x="14" y="136" width="46" height="8" rx="4" fill="#a99f8c"/>
  </g>
</svg>
