<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="「怖い」と書かれた札を、人とAIさんが一緒に「だいじょうぶ」と「気をつければOK」の2つのトレイに仕分けている図">
  <defs>
    <style>
      .cap { font-family: 'Zen Kurenaido', 'Shippori Mincho B1', serif; }
      .label { font-family: 'Noto Sans JP', sans-serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="640" height="360" rx="16" fill="#faf6ef"/>

  <!-- 人（左）：トップページのマスコット（白髪・金縁メガネ・紺フリース・カップ）。表情だけ不安げに -->
  <g>
    <g transform="translate(108,132) scale(0.35)">
      <!-- あぐらの下半身 -->
      <path d="M-64 250 C-72 302 -18 320 10 302 C-4 326 -66 322 -72 286 Z" fill="#1c2942"/>
      <path d="M64 250 C72 302 18 320 -10 302 C4 326 66 322 72 286 Z" fill="#243654"/>
      <!-- 首 -->
      <rect x="-14" y="48" width="28" height="22" rx="7" fill="#e6b892"/>
      <!-- 胴体（紺フリース） -->
      <path d="M-66 252 C-78 168 -58 80 -18 64 C-8 58 8 58 18 64 C58 80 78 168 66 252 Z" fill="#22314f"/>
      <!-- 襟・インナー -->
      <path d="M-30 70 Q0 56 30 70 L22 98 Q0 84 -22 98 Z" fill="#2c3c5e"/>
      <path d="M-17 78 Q0 68 17 78 L11 100 Q0 92 -11 100 Z" fill="#e9eef5"/>
      <line x1="0" y1="96" x2="0" y2="244" stroke="#33456b" stroke-width="3"/>
      <!-- 髪（後ろ・白髪ウェーブ） -->
      <path d="M-72 6 C-88 -66 -44 -100 0 -100 C44 -100 88 -66 72 6 C64 -6 54 -4 48 8 C40 -8 30 -6 24 8 C16 -8 4 -8 -2 8 C-10 -8 -22 -8 -28 8 C-36 -6 -48 -6 -54 10 C-60 2 -66 2 -72 6 Z" fill="#8c908c"/>
      <!-- 顔 -->
      <circle cx="0" cy="0" r="60" fill="#f0c9a8"/>
      <path d="M-52 -52 C-30 -74 30 -74 52 -50" stroke="#a9ada8" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M-44 -34 C-30 -50 -6 -52 6 -40" stroke="#7d817d" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M46 -30 C34 -46 14 -48 4 -38" stroke="#7d817d" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
      <!-- ほほ -->
      <circle cx="-38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
      <circle cx="38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
      <!-- 不安げな眉と目（開いた点目） -->
      <path d="M-40 -12 Q-26 -20 -14 -14" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path d="M14 -14 Q26 -20 40 -12" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <circle cx="-26" cy="8" r="6" fill="#4a3b2f"/>
      <circle cx="26" cy="8" r="6" fill="#4a3b2f"/>
      <!-- 金縁メガネ -->
      <g stroke="#c9a44a" stroke-width="3.5" fill="#ffffff" fill-opacity="0.14">
        <ellipse cx="-26" cy="6" rx="22" ry="15"/>
        <ellipse cx="26" cy="6" rx="22" ry="15"/>
      </g>
      <path d="M-4 4 Q0 -1 4 4" stroke="#c9a44a" stroke-width="3.5" fill="none"/>
      <line x1="-48" y1="2" x2="-64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
      <line x1="48" y1="2" x2="64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
      <!-- 口（心配そうにきゅっと） -->
      <path d="M-12 40 Q0 33 12 40" stroke="#9e4a3a" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- 腕（カップを持つ） -->
      <path d="M-56 132 C-64 178 -32 198 -8 198" fill="none" stroke="#22314f" stroke-width="30" stroke-linecap="round"/>
      <path d="M56 132 C64 178 32 198 8 198" fill="none" stroke="#243654" stroke-width="30" stroke-linecap="round"/>
      <!-- カップ -->
      <path d="M-17 176 h34 a4 4 0 0 1 4 4 v13 a13 13 0 0 1 -13 13 h-16 a13 13 0 0 1 -13 -13 v-13 a4 4 0 0 1 4 -4 Z" fill="#ffffff" stroke="#d9cfbb" stroke-width="1.5"/>
      <path d="M21 182 a9 9 0 0 1 0 18" fill="none" stroke="#d9cfbb" stroke-width="3"/>
      <ellipse cx="0" cy="180" rx="15" ry="4.5" fill="#8a5a3c"/>
      <!-- 手 -->
      <circle cx="-12" cy="198" r="13" fill="#f0c9a8"/>
      <circle cx="12" cy="198" r="13" fill="#f0c9a8"/>
    </g>
    <!-- ふきだし -->
    <g>
      <rect x="52" y="24" width="120" height="40" rx="12" fill="#ffffff" stroke="#e6e0d4" stroke-width="2"/>
      <path d="M96 64 l8 12 l4 -12 z" fill="#ffffff" stroke="#e6e0d4" stroke-width="2"/>
      <text x="112" y="50" text-anchor="middle" class="cap" font-size="19" fill="#2a2620">なんだか怖い…</text>
    </g>
  </g>

  <!-- AIさん（右）：おだやか -->
  <g>
    <rect x="486" y="88" width="68" height="58" rx="14" fill="#2d5a27"/>
    <line x1="520" y1="78" x2="520" y2="88" stroke="#2d5a27" stroke-width="4" stroke-linecap="round"/>
    <circle cx="520" cy="74" r="5" fill="#d97757"/>
    <!-- 目（にこにこ） -->
    <path d="M500 112 q6 6 12 0" fill="none" stroke="#faf6ef" stroke-width="3" stroke-linecap="round"/>
    <path d="M528 112 q6 6 12 0" fill="none" stroke="#faf6ef" stroke-width="3" stroke-linecap="round"/>
    <path d="M510 130 q10 7 20 0" fill="none" stroke="#faf6ef" stroke-width="3" stroke-linecap="round"/>
    <!-- 体 -->
    <rect x="494" y="152" width="52" height="42" rx="10" fill="#4a8c3f" opacity="0.9"/>
    <!-- ふきだし -->
    <g>
      <rect x="418" y="18" width="200" height="42" rx="12" fill="#ffffff" stroke="#e6e0d4" stroke-width="2"/>
      <path d="M540 60 l-4 12 l-8 -12 z" fill="#ffffff" stroke="#e6e0d4" stroke-width="2"/>
      <text x="518" y="45" text-anchor="middle" class="cap" font-size="19" fill="#2a2620">一緒に並べてみましょう</text>
    </g>
  </g>

  <!-- 中央：怖さの札（仕分け前） -->
  <g class="cap" font-size="15">
    <g transform="translate(232 96) rotate(-6)">
      <rect width="90" height="34" rx="8" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
      <text x="45" y="23" text-anchor="middle" fill="#2a2620">こわしそう</text>
    </g>
    <g transform="translate(330 88) rotate(4)">
      <rect width="96" height="34" rx="8" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
      <text x="48" y="23" text-anchor="middle" fill="#2a2620">まちがえそう</text>
    </g>
    <g transform="translate(268 140) rotate(2)">
      <rect width="110" height="34" rx="8" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
      <text x="55" y="23" text-anchor="middle" fill="#2a2620">はずかしい…</text>
    </g>
  </g>

  <!-- 矢印（札 → 2つのトレイ） -->
  <path d="M270 196 q-30 30 -66 44" fill="none" stroke="#9a948a" stroke-width="2.5" stroke-dasharray="6 5" stroke-linecap="round" marker-end="none"/>
  <path d="M370 196 q30 30 66 44" fill="none" stroke="#9a948a" stroke-width="2.5" stroke-dasharray="6 5" stroke-linecap="round"/>

  <!-- トレイ左：だいじょうぶ -->
  <g>
    <rect x="120" y="248" width="180" height="72" rx="12" fill="#e8efe6" stroke="#2d5a27" stroke-width="2.5"/>
    <text x="210" y="292" text-anchor="middle" class="cap" font-size="22" fill="#1a3d18">だいじょうぶ</text>
  </g>

  <!-- トレイ右：気をつければOK -->
  <g>
    <rect x="340" y="248" width="180" height="72" rx="12" fill="#f9e8df" stroke="#b85f3d" stroke-width="2.5"/>
    <text x="430" y="285" text-anchor="middle" class="cap" font-size="20" fill="#b85f3d">気をつければ</text>
    <text x="430" y="308" text-anchor="middle" class="cap" font-size="20" fill="#b85f3d">OK</text>
  </g>
</svg>
