<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300" role="img" aria-label="スキル誕生の流れ図。①Webで良い記事に出会う ②Webクリッパーでノートに切り抜き保存 ③後日、保存した記事をAIに「スキル化できる？」と渡す ④AIが手順書の中身を提案。下段で「いいね」と承認してスキル完成。人間が書いた文章はお願いの一言だけ">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b7ac97"/>
    </marker>
  </defs>

  <text x="24" y="36" class="lbl" font-size="16" font-weight="700" fill="#2f5d3a">うちのスキルが生まれるまで</text>

  <!-- ① 記事に出会う -->
  <rect x="18" y="56" width="136" height="118" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="40" cy="78" r="11" fill="#d97757"/>
  <text x="40" y="83" text-anchor="middle" class="lbl" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <g transform="translate(58,64)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
    <line x1="0" y1="8" x2="40" y2="8" stroke="#7c7360" stroke-width="2"/>
    <circle cx="5" cy="4" r="1.6" fill="#d97757"/>
    <line x1="6" y1="15" x2="34" y2="15" stroke="#b7ac97" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="21" x2="28" y2="21" stroke="#b7ac97" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="86" y="122" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">Webで良い記事に</text>
  <text x="86" y="139" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">出会う</text>
  <text x="86" y="160" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">「AIへの頼み方のコツ」</text>

  <line x1="156" y1="115" x2="172" y2="115" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- ② 切り抜いて保存 -->
  <rect x="174" y="56" width="136" height="118" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="196" cy="78" r="11" fill="#d97757"/>
  <text x="196" y="83" text-anchor="middle" class="lbl" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <g transform="translate(216,62)">
    <path d="M4 4 l14 14 M18 4 L4 18" stroke="#7c7360" stroke-width="2.4" stroke-linecap="round"/>
    <circle cx="3" cy="3" r="3" fill="none" stroke="#7c7360" stroke-width="2"/>
    <circle cx="3" cy="19" r="3" fill="none" stroke="#7c7360" stroke-width="2"/>
    <rect x="26" y="2" width="26" height="32" rx="3" fill="#faf6ef" stroke="#4a8c3f" stroke-width="2.2"/>
    <line x1="32" y1="11" x2="46" y2="11" stroke="#4a8c3f" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="32" y1="18" x2="46" y2="18" stroke="#bcd7b3" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="32" y1="25" x2="42" y2="25" stroke="#bcd7b3" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <text x="242" y="122" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">切り抜いて</text>
  <text x="242" y="139" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">ノートに保存</text>
  <text x="242" y="160" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">Webクリッパー（拡張機能）</text>

  <line x1="312" y1="115" x2="328" y2="115" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- ③ AIに渡す -->
  <rect x="330" y="56" width="136" height="118" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="352" cy="78" r="11" fill="#d97757"/>
  <text x="352" y="83" text-anchor="middle" class="lbl" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <g transform="translate(374,62)">
    <rect x="0" y="4" width="22" height="28" rx="3" fill="#faf6ef" stroke="#4a8c3f" stroke-width="2"/>
    <path d="M28 18 h16 M38 12 l8 6 -8 6" fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="398" y="122" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">後日、AIに渡す</text>
  <text x="398" y="141" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">「この記事、</text>
  <text x="398" y="156" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">スキル化できる？」</text>

  <line x1="468" y1="115" x2="484" y2="115" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- ④ AIが提案 -->
  <rect x="486" y="56" width="136" height="118" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="508" cy="78" r="11" fill="#d97757"/>
  <text x="508" y="83" text-anchor="middle" class="lbl" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <g transform="translate(528,60)">
    <line x1="14" y1="6" x2="14" y2="2" stroke="#2f5d3a" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="14" cy="0" r="2.8" fill="#ffd15c"/>
    <rect x="1" y="6" width="26" height="21" rx="7" fill="#faf6ef" stroke="#2f5d3a" stroke-width="2"/>
    <rect x="6.5" y="11" width="15" height="11" rx="3.8" fill="#1f3a26"/>
    <circle cx="11" cy="16.5" r="2.1" fill="#8fe0b0"/>
    <circle cx="17" cy="16.5" r="2.1" fill="#8fe0b0"/>
    <rect x="34" y="4" width="20" height="26" rx="3" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
    <line x1="38" y1="10" x2="50" y2="10" stroke="#d97757" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="38" y1="16" x2="50" y2="16" stroke="#e8c0ae" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="38" y1="21" x2="46" y2="21" stroke="#e8c0ae" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <text x="554" y="122" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">AIが手順書の</text>
  <text x="554" y="139" text-anchor="middle" class="lbl" font-size="12.5" font-weight="700" fill="#5f5847">中身を提案</text>
  <text x="554" y="160" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">「作りますか？」</text>

  <!-- 下段へ -->
  <line x1="554" y1="174" x2="554" y2="196" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- 完成バナー -->
  <rect x="18" y="200" width="604" height="76" rx="14" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <g transform="translate(44,218)">
    <rect x="0" y="0" width="30" height="40" rx="4" fill="#ffffff" stroke="#4a8c3f" stroke-width="2.4"/>
    <line x1="6" y1="10" x2="24" y2="10" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="18" x2="24" y2="18" stroke="#bcd7b3" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="26" x2="18" y2="26" stroke="#bcd7b3" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="36" r="11" fill="#4a8c3f"/>
    <path d="M24.5 36 l4 4 7.5 -8" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="104" y="233" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">「いいね、それで」の一言で —— スキル完成</text>
  <text x="104" y="258" class="lbl" font-size="12" fill="#4a8c3f">カードの中身を書いたのはAI本人。人間が書いた文章は、お願いの一言だけ</text>
</svg>
