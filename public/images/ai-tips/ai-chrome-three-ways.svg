<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="3社3様の“住まわせ方”の図。Claudeはいまの家（Chrome）に拡張機能として後から住み込む。GeminiはChromeに標準搭載で最初から家に住んでいる。ChatGPTは専用ブラウザやアプリ内蔵ブラウザで家ごと新しく建てる。どれが偉いかではなく、住まわせ方のちがい">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <text x="24" y="40" class="lbl" font-size="18" font-weight="700" fill="#2f5d3a">3社3様の、“住まわせ方”</text>

  <!-- Claude：後から住み込む -->
  <rect x="24" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="116" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">Claude</text>
  <g transform="translate(52,106)">
    <!-- 家（既存の家＝Chrome） -->
    <path d="M14 34 L62 6 L110 34 Z" fill="#d97757"/>
    <rect x="24" y="34" width="76" height="52" fill="#faf6ef" stroke="#b7ac97" stroke-width="1.6"/>
    <rect x="62" y="52" width="22" height="34" rx="2" fill="#e6dfcf" stroke="#b7ac97" stroke-width="1.4"/>
    <!-- ロボットが道具箱を持って玄関へ -->
    <g transform="translate(0,56)">
      <line x1="14" y1="5.5" x2="14" y2="1.5" stroke="#2f5d3a" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="0" r="2.5" fill="#ffd15c"/>
      <rect x="2" y="5.5" width="24" height="20" rx="6" fill="#faf6ef" stroke="#2f5d3a" stroke-width="1.8"/>
      <rect x="7" y="10" width="14" height="11" rx="3.5" fill="#1f3a26"/>
      <circle cx="11" cy="15.5" r="2" fill="#8fe0b0"/>
      <circle cx="17" cy="15.5" r="2" fill="#8fe0b0"/>
      <g transform="translate(26,14)">
        <rect x="0" y="3" width="16" height="9" rx="2" fill="#d97757"/>
        <path d="M5 3 v-2 h6 v2" fill="none" stroke="#d97757" stroke-width="1.8"/>
      </g>
    </g>
    <path d="M34 76 h20 M48 71 l7 5 -7 5" fill="none" stroke="#4a8c3f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="116" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">いまの家に、</text>
  <text x="116" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">後から住み込む</text>
  <text x="116" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">Chrome拡張機能</text>

  <!-- Gemini：最初から住んでいる -->
  <rect x="228" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="320" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">Gemini</text>
  <g transform="translate(256,106)">
    <path d="M14 34 L62 6 L110 34 Z" fill="#4a8c3f"/>
    <rect x="24" y="34" width="76" height="52" fill="#faf6ef" stroke="#b7ac97" stroke-width="1.6"/>
    <!-- 窓の中に最初からロボット -->
    <rect x="38" y="46" width="48" height="30" rx="3" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="1.4"/>
    <g transform="translate(50,50)">
      <line x1="12" y1="5" x2="12" y2="1.5" stroke="#2f5d3a" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="12" cy="0" r="2.2" fill="#ffd15c"/>
      <rect x="2" y="5" width="20" height="17" rx="5" fill="#faf6ef" stroke="#2f5d3a" stroke-width="1.6"/>
      <rect x="6" y="8.5" width="12" height="10" rx="3" fill="#1f3a26"/>
      <circle cx="9.5" cy="13.5" r="1.7" fill="#8fe0b0"/>
      <circle cx="14.5" cy="13.5" r="1.7" fill="#8fe0b0"/>
    </g>
  </g>
  <text x="320" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">最初から、</text>
  <text x="320" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">家に住んでいる</text>
  <text x="320" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">Chromeに標準搭載</text>

  <!-- ChatGPT：家ごと新築 -->
  <rect x="432" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="524" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">ChatGPT</text>
  <g transform="translate(460,106)">
    <!-- 新築の家（キラキラ） -->
    <path d="M14 34 L62 6 L110 34 Z" fill="#7c9a5f"/>
    <rect x="24" y="34" width="76" height="52" fill="#ffffff" stroke="#b7ac97" stroke-width="1.6"/>
    <rect x="38" y="46" width="48" height="30" rx="3" fill="#f3f7ef" stroke="#bcd7b3" stroke-width="1.4"/>
    <g transform="translate(50,50)">
      <line x1="12" y1="5" x2="12" y2="1.5" stroke="#2f5d3a" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="12" cy="0" r="2.2" fill="#ffd15c"/>
      <rect x="2" y="5" width="20" height="17" rx="5" fill="#faf6ef" stroke="#2f5d3a" stroke-width="1.6"/>
      <rect x="6" y="8.5" width="12" height="10" rx="3" fill="#1f3a26"/>
      <circle cx="9.5" cy="13.5" r="1.7" fill="#8fe0b0"/>
      <circle cx="14.5" cy="13.5" r="1.7" fill="#8fe0b0"/>
    </g>
    <!-- キラキラ -->
    <path d="M8 10 l2 4 4 2 -4 2 -2 4 -2 -4 -4 -2 4 -2 Z" fill="#ffd15c"/>
    <path d="M112 52 l1.6 3.2 3.2 1.6 -3.2 1.6 -1.6 3.2 -1.6 -3.2 -3.2 -1.6 3.2 -1.6 Z" fill="#ffd15c"/>
  </g>
  <text x="524" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">家ごと、</text>
  <text x="524" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">新しく建てる</text>
  <text x="524" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">専用ブラウザ・アプリ内蔵</text>

  <!-- 締めのピル -->
  <rect x="140" y="312" width="360" height="32" rx="16" fill="#d97757"/>
  <text x="320" y="333" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#ffffff">どれが偉いかではなく、“住まわせ方”のちがい</text>
</svg>
