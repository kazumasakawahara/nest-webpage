<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 210" width="600" height="210" role="img" aria-label="スマホでレシートを撮り、AIが読み取り、ExcelやGoogleスプレッドシートの表に貼り付ける流れの図">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <!-- ① スマホ（レシート） -->
  <g>
    <rect x="52" y="24" width="84" height="132" rx="14" fill="#2b3a2c"/>
    <rect x="60" y="34" width="68" height="112" rx="7" fill="#faf6ef"/>
    <!-- レシート -->
    <path d="M74 44 h40 v76 l-6 5 -6 -5 -6 5 -6 -5 -6 5 -6 -5 -4 3 Z" fill="#ffffff" stroke="#d9cfbb" stroke-width="1.2"/>
    <rect x="80" y="52" width="28" height="4" rx="2" fill="#3a4a3c"/>
    <rect x="80" y="62" width="24" height="3.5" rx="1.7" fill="#c3b9a6"/>
    <rect x="80" y="72" width="28" height="3.5" rx="1.7" fill="#c3b9a6"/>
    <rect x="80" y="82" width="20" height="3.5" rx="1.7" fill="#c3b9a6"/>
    <rect x="80" y="98" width="28" height="5" rx="2.5" fill="#4a8c3f"/>
    <text x="94" y="182" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#102211">① スマホで撮る</text>
  </g>

  <!-- 矢印 -->
  <g fill="#faf6ef">
    <path d="M158 90 h34 v-9 l18 15 -18 15 v-9 h-34 Z" opacity="0.9"/>
  </g>

  <!-- ② AIさん -->
  <g transform="translate(238,28)">
    <line x1="52" y1="16" x2="52" y2="2" stroke="#2f5d3a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="52" cy="-4" r="8" fill="#ffd15c"/>
    <rect x="12" y="16" width="80" height="70" rx="20" fill="#faf6ef" stroke="#2f5d3a" stroke-width="4"/>
    <rect x="26" y="32" width="52" height="40" rx="12" fill="#1f3a26"/>
    <circle cx="42" cy="50" r="7" fill="#8fe0b0"/>
    <circle cx="62" cy="50" r="7" fill="#8fe0b0"/>
    <path d="M44 62 Q52 70 60 62" fill="none" stroke="#8fe0b0" stroke-width="4" stroke-linecap="round"/>
    <circle cx="30" cy="63" r="4.5" fill="#d97757" opacity="0.85"/>
    <circle cx="74" cy="63" r="4.5" fill="#d97757" opacity="0.85"/>
    <text x="52" y="154" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#102211">② AIが読み取る</text>
  </g>

  <!-- 矢印 -->
  <g fill="#faf6ef">
    <path d="M366 90 h34 v-9 l18 15 -18 15 v-9 h-34 Z" opacity="0.9"/>
  </g>

  <!-- ③ 表（Excel / スプレッドシート） -->
  <g>
    <rect x="432" y="34" width="132" height="104" rx="10" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
    <rect x="432" y="34" width="132" height="24" rx="10" fill="#dceccf"/>
    <rect x="432" y="50" width="132" height="8" fill="#dceccf"/>
    <line x1="474" y1="34" x2="474" y2="138" stroke="#e3d8c4" stroke-width="1.5"/>
    <line x1="516" y1="34" x2="516" y2="138" stroke="#e3d8c4" stroke-width="1.5"/>
    <g stroke="#eee6d6" stroke-width="1.5">
      <line x1="432" y1="82" x2="564" y2="82"/>
      <line x1="432" y1="106" x2="564" y2="106"/>
    </g>
    <!-- ヘッダ小テキスト -->
    <g class="lbl" font-size="9" fill="#1f3a26">
      <text x="440" y="51">日付</text>
      <text x="482" y="51">店名</text>
      <text x="524" y="51">金額</text>
    </g>
    <!-- セルの中身（ダミー） -->
    <g fill="#c3b9a6">
      <rect x="440" y="68" width="24" height="6" rx="3"/><rect x="482" y="68" width="24" height="6" rx="3"/><rect x="524" y="68" width="30" height="6" rx="3" fill="#3a4a3c"/>
      <rect x="440" y="92" width="24" height="6" rx="3"/><rect x="482" y="92" width="20" height="6" rx="3"/><rect x="524" y="92" width="30" height="6" rx="3" fill="#3a4a3c"/>
      <rect x="440" y="116" width="24" height="6" rx="3"/><rect x="482" y="116" width="26" height="6" rx="3"/><rect x="524" y="116" width="30" height="6" rx="3" fill="#3a4a3c"/>
    </g>
    <text x="498" y="182" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#102211">③ 表に貼る</text>
  </g>
</svg>
