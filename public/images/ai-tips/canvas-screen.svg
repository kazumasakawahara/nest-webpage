<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="GeminiのCanvas画面のイメージ。左側で会話し、右側にできあがった文書が表示される。文書はその場で直せる">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#102211" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- ウィンドウ -->
  <rect x="10" y="10" width="620" height="352" rx="16" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5" filter="url(#sh2)"/>
  <!-- タイトルバー -->
  <path d="M10 26 a16 16 0 0 1 16 -16 H614 a16 16 0 0 1 16 16 V44 H10 Z" fill="#f3ead9"/>
  <circle cx="34" cy="27" r="6" fill="#e0685a"/>
  <circle cx="54" cy="27" r="6" fill="#e8b64b"/>
  <circle cx="74" cy="27" r="6" fill="#5aa85a"/>
  <text x="316" y="32" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#8a8073">Gemini</text>

  <!-- 仕切り線 -->
  <line x1="278" y1="44" x2="278" y2="362" stroke="#eee6d6" stroke-width="1.5"/>

  <!-- 左：会話 -->
  <text x="30" y="72" class="lbl" font-size="12" font-weight="700" fill="#d97757">会話（お願いする）</text>
  <!-- ユーザー吹き出し -->
  <g>
    <rect x="70" y="88" width="188" height="52" rx="14" fill="#f3ead9"/>
    <text x="86" y="110" class="lbl" font-size="13" fill="#2c3a2e">見学のご案内文を</text>
    <text x="86" y="130" class="lbl" font-size="13" fill="#2c3a2e">作ってください</text>
  </g>
  <!-- Gemini 吹き出し -->
  <g>
    <rect x="30" y="152" width="210" height="52" rx="14" fill="#dceccf"/>
    <text x="46" y="174" class="lbl" font-size="13" fill="#1f3a26">はい、作りました。</text>
    <text x="46" y="194" class="lbl" font-size="13" fill="#1f3a26">右をご覧ください ✏️</text>
  </g>
  <!-- その場で直すチップ -->
  <text x="30" y="238" class="lbl" font-size="12" fill="#8a8073">話しかけて直せます：</text>
  <g class="lbl" font-size="12" fill="#2f5d3a" font-weight="700">
    <rect x="30" y="248" width="70" height="26" rx="13" fill="#eaf2e5" stroke="#bcd7b3"/><text x="65" y="265" text-anchor="middle">もっと短く</text>
    <rect x="108" y="248" width="92" height="26" rx="13" fill="#eaf2e5" stroke="#bcd7b3"/><text x="154" y="265" text-anchor="middle">やさしい言葉に</text>
    <rect x="30" y="282" width="82" height="26" rx="13" fill="#eaf2e5" stroke="#bcd7b3"/><text x="71" y="299" text-anchor="middle">箇条書きに</text>
  </g>

  <!-- 右：できた文書 -->
  <text x="298" y="72" class="lbl" font-size="12" font-weight="700" fill="#4a8c3f">できた文書（その場で直せる）</text>
  <!-- 文書エリア -->
  <rect x="298" y="84" width="314" height="228" rx="10" fill="#ffffff" stroke="#e3d8c4" stroke-width="1.5"/>
  <!-- 右上のツール（Googleドキュメントへ書き出し・コピー） -->
  <g>
    <rect x="500" y="94" width="30" height="24" rx="6" fill="#eef4fb" stroke="#c4d4e6"/>
    <rect x="508" y="100" width="14" height="12" rx="2" fill="#4285f4"/>
    <rect x="536" y="94" width="30" height="24" rx="6" fill="#f3ead9" stroke="#e3d8c4"/>
    <rect x="543" y="100" width="9" height="11" rx="1.5" fill="#8a8073"/><rect x="547" y="103" width="9" height="11" rx="1.5" fill="#a99f8c"/>
  </g>
  <!-- タイトル行 -->
  <rect x="316" y="112" width="150" height="12" rx="6" fill="#1f3a26"/>
  <!-- 本文行 -->
  <g fill="#cbc2b0">
    <rect x="316" y="140" width="270" height="8" rx="4"/>
    <rect x="316" y="158" width="278" height="8" rx="4"/>
    <rect x="316" y="176" width="240" height="8" rx="4"/>
    <rect x="316" y="200" width="120" height="8" rx="4" fill="#7ea877"/>
    <rect x="316" y="218" width="266" height="8" rx="4"/>
    <rect x="316" y="236" width="252" height="8" rx="4"/>
    <rect x="316" y="254" width="200" height="8" rx="4"/>
    <rect x="316" y="278" width="140" height="8" rx="4" fill="#e0a487"/>
  </g>
</svg>
