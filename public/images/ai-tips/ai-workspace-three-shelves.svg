<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="3社の“棚の置き場所”比較図。Claudeはパソコンの中の専用フォルダ（コネクタでつなぐ）。ChatGPTも同じくパソコンの中の専用フォルダ（設定画面から・Claudeと同じ規格）。GeminiはGoogleドライブの上に棚を置き、読むのはAI・書き残すのは人間。どれが偉いかではなく、棚の置き場所のちがい">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <text x="24" y="40" class="lbl" font-size="18" font-weight="700" fill="#2f5d3a">3社3様の、“棚の置き場所”</text>

  <!-- Claude：パソコンの中 -->
  <rect x="24" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="116" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">Claude</text>
  <g transform="translate(52,110)">
    <!-- パソコン -->
    <rect x="14" y="8" width="100" height="64" rx="6" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
    <rect x="48" y="72" width="32" height="6" fill="#7c7360"/>
    <rect x="34" y="78" width="60" height="4" rx="2" fill="#b7ac97"/>
    <!-- 画面の中の専用フォルダ -->
    <g transform="translate(38,22)">
      <path d="M0 6 q0 -4 4 -4 h12 l4 4 h28 q4 0 4 4 v22 q0 4 -4 4 h-44 q-4 0 -4 -4 z" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="2"/>
      <text x="26" y="26" text-anchor="middle" class="lbl" font-size="8.5" fill="#2f5d3a">AI相談室</text>
    </g>
  </g>
  <text x="116" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">パソコンの中の、</text>
  <text x="116" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">専用フォルダ</text>
  <text x="116" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">コネクタでつなぐ</text>

  <!-- ChatGPT：パソコンの中（同じ規格） -->
  <rect x="228" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="320" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">ChatGPT</text>
  <g transform="translate(256,110)">
    <rect x="14" y="8" width="100" height="64" rx="6" fill="#faf6ef" stroke="#7c7360" stroke-width="2"/>
    <rect x="48" y="72" width="32" height="6" fill="#7c7360"/>
    <rect x="34" y="78" width="60" height="4" rx="2" fill="#b7ac97"/>
    <g transform="translate(38,22)">
      <path d="M0 6 q0 -4 4 -4 h12 l4 4 h28 q4 0 4 4 v22 q0 4 -4 4 h-44 q-4 0 -4 -4 z" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="2"/>
      <text x="26" y="26" text-anchor="middle" class="lbl" font-size="8.5" fill="#2f5d3a">共有フォルダ</text>
    </g>
    <!-- 共通規格＝コンセント -->
    <g transform="translate(96,44)">
      <circle cx="10" cy="10" r="10" fill="#d97757"/>
      <rect x="6.5" y="6" width="2.6" height="5" rx="1.3" fill="#ffffff"/>
      <rect x="11" y="6" width="2.6" height="5" rx="1.3" fill="#ffffff"/>
      <path d="M7 13.5 h6 q0 3 -3 3 t-3 -3" fill="#ffffff"/>
    </g>
  </g>
  <text x="320" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">パソコンの中の、</text>
  <text x="320" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">専用フォルダ</text>
  <text x="320" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">設定画面から・Claudeと同じ規格</text>

  <!-- Gemini：Googleドライブの上 -->
  <rect x="432" y="60" width="184" height="230" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="524" y="92" text-anchor="middle" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">Gemini</text>
  <g transform="translate(460,108)">
    <!-- 雲（Googleドライブ） -->
    <path d="M30 52 a16 16 0 0 1 6 -31 a20 20 0 0 1 38 -6 a15 15 0 0 1 14 25 a12 12 0 0 1 -8 12 z" fill="#eef3fb" stroke="#8fa8cc" stroke-width="2"/>
    <!-- 雲の上のフォルダ -->
    <g transform="translate(38,18)">
      <path d="M0 5 q0 -3.5 3.5 -3.5 h10 l3.5 3.5 h24 q3.5 0 3.5 3.5 v18 q0 3.5 -3.5 3.5 h-37.5 q-3.5 0 -3.5 -3.5 z" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
      <text x="22" y="22" text-anchor="middle" class="lbl" font-size="8" fill="#2f5d3a">申し送り</text>
    </g>
    <text x="64" y="76" text-anchor="middle" class="lbl" font-size="10.5" fill="#7c7360">Google ドライブ</text>
  </g>
  <text x="524" y="232" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">Googleドライブの</text>
  <text x="524" y="250" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">上に、棚を置く</text>
  <text x="524" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#7c7360">読むのはAI・書くのは人間</text>

  <!-- 締めのピル -->
  <rect x="140" y="312" width="360" height="32" rx="16" fill="#d97757"/>
  <text x="320" y="333" text-anchor="middle" class="lbl" font-size="13" font-weight="700" fill="#ffffff">どれが偉いかではなく、“棚の置き場所”のちがい</text>
</svg>
