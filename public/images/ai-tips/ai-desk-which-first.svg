<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300" role="img" aria-label="どちらから試すかの見取り図。事業所がGoogle Workspace（Business Standard以上）を使っているなら、まずGeminiの同席型（追加インストール不要）。Officeソフト中心・環境がバラバラ・提出用ファイルが欲しいなら、Claudeの納品型。迷ったら同じお願いを両方に出して比べる">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
    <marker id="arw2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#b7ac97"/>
    </marker>
  </defs>

  <!-- 問い -->
  <rect x="170" y="20" width="300" height="52" rx="26" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="320" y="43" text-anchor="middle" class="lbl" font-size="14.5" font-weight="700" fill="#5f5847">事業所の書類は、いまどこにある？</text>
  <text x="320" y="62" text-anchor="middle" class="lbl" font-size="10.5" fill="#9a907c">判断の入口はここだけ</text>

  <!-- 分岐線 -->
  <path d="M250 72 C 220 92, 190 100, 170 112" fill="none" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw2)"/>
  <path d="M390 72 C 420 92, 450 100, 470 112" fill="none" stroke="#b7ac97" stroke-width="2.5" marker-end="url(#arw2)"/>
  <text x="150" y="98" class="lbl" font-size="11.5" font-weight="600" fill="#5f5847">Googleドライブ中心</text>
  <text x="410" y="98" class="lbl" font-size="11.5" font-weight="600" fill="#5f5847">Word/Excelファイル中心</text>

  <!-- 左：Gemini同席型 -->
  <rect x="36" y="118" width="270" height="116" rx="14" fill="#eaf2e5" stroke="#4a8c3f" stroke-width="2"/>
  <text x="58" y="146" class="lbl" font-size="15" font-weight="700" fill="#2f5d3a">まず Gemini（同席型）</text>
  <g class="lbl" font-size="11.5" fill="#264a2c">
    <g><path d="M58 160 l4 4 7 -8" fill="none" stroke="#4a8c3f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="76" y="168">追加インストールなしで今日から</text></g>
    <g><path d="M58 182 l4 4 7 -8" fill="none" stroke="#4a8c3f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="76" y="190">共有もドライブのまま</text></g>
  </g>
  <text x="58" y="220" class="lbl" font-size="10" fill="#4a8c3f">※ Business Standard 以上（Starterは対象外）</text>

  <!-- 右：Claude納品型 -->
  <rect x="334" y="118" width="270" height="116" rx="14" fill="#fdf3ee" stroke="#d97757" stroke-width="2"/>
  <text x="356" y="146" class="lbl" font-size="15" font-weight="700" fill="#b05a3e">まず Claude（納品型）</text>
  <g class="lbl" font-size="11.5" fill="#6b4534">
    <g><path d="M356 160 l4 4 7 -8" fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="374" y="168">そのまま提出できるファイルが届く</text></g>
    <g><path d="M356 182 l4 4 7 -8" fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="374" y="190">メール添付・印刷の文化と相性◎</text></g>
  </g>
  <text x="356" y="220" class="lbl" font-size="10" fill="#c98a72">※ 設定で「ファイル作成」をオンに</text>

  <!-- 迷ったら -->
  <rect x="120" y="252" width="400" height="34" rx="17" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <text x="320" y="274" text-anchor="middle" class="lbl" font-size="12" fill="#5f5847">迷ったら —— 同じお願いを両方に出して、仕上がりを比べる（第1回方式）</text>
</svg>
