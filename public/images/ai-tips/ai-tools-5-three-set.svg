<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270" width="640" height="270" role="img" aria-label="第1回の“差”の正体は三点セットだった、という図。道具箱＋手順書＋台帳＝現場の相棒AI">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <text x="24" y="42" class="lbl" font-size="17" font-weight="700" fill="#2f5d3a">第1回の“差”の正体は、この三点セット</text>

  <!-- 道具箱 -->
  <rect x="32" y="70" width="124" height="130" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <g transform="translate(68,96)">
    <rect x="0" y="8" width="52" height="28" rx="6" fill="#d97757"/>
    <path d="M16 8 v-6 h20 v6" fill="none" stroke="#d97757" stroke-width="4"/>
    <rect x="21" y="16" width="10" height="8" rx="2" fill="#ffffff"/>
  </g>
  <text x="94" y="166" text-anchor="middle" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">道具</text>
  <text x="94" y="185" text-anchor="middle" class="lbl" font-size="11" fill="#7c7360">外とつながる手足</text>

  <text x="172" y="146" text-anchor="middle" class="lbl" font-size="22" font-weight="700" fill="#4a8c3f">＋</text>

  <!-- 手順書 -->
  <rect x="188" y="70" width="124" height="130" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <g transform="translate(229,92)">
    <rect x="0" y="0" width="42" height="52" rx="4" fill="#faf6ef" stroke="#4a8c3f" stroke-width="2.4"/>
    <line x1="9" y1="14" x2="33" y2="14" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="25" x2="33" y2="25" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="36" x2="24" y2="36" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="250" y="166" text-anchor="middle" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">手順書</text>
  <text x="250" y="185" text-anchor="middle" class="lbl" font-size="11" fill="#7c7360">うちのやり方のメモ</text>

  <text x="328" y="146" text-anchor="middle" class="lbl" font-size="22" font-weight="700" fill="#4a8c3f">＋</text>

  <!-- 台帳 -->
  <rect x="344" y="70" width="124" height="130" rx="14" fill="#ffffff" stroke="#ddd3c1" stroke-width="1.5"/>
  <g transform="translate(388,94)">
    <rect x="0" y="0" width="32" height="46" rx="4" fill="#4a8c3f"/>
    <rect x="6" y="0" width="4" height="46" fill="#2f5d3a"/>
    <line x1="16" y1="12" x2="26" y2="12" stroke="#eaf2e5" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="16" y1="22" x2="26" y2="22" stroke="#eaf2e5" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="16" y1="32" x2="26" y2="32" stroke="#eaf2e5" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  <text x="406" y="166" text-anchor="middle" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">台帳</text>
  <text x="406" y="185" text-anchor="middle" class="lbl" font-size="11" fill="#7c7360">貯めてきた情報</text>

  <text x="490" y="146" text-anchor="middle" class="lbl" font-size="22" font-weight="700" fill="#d97757">＝</text>

  <!-- 相棒AI -->
  <g transform="translate(534,96)">
    <line x1="27" y1="10.5" x2="27" y2="3" stroke="#2f5d3a" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="27" cy="0" r="4.8" fill="#ffd15c"/>
    <rect x="3" y="10.5" width="48" height="39" rx="12" fill="#faf6ef" stroke="#2f5d3a" stroke-width="3"/>
    <rect x="13.5" y="19.5" width="27" height="21" rx="6.5" fill="#1f3a26"/>
    <circle cx="21.5" cy="30" r="3.9" fill="#8fe0b0"/>
    <circle cx="32" cy="30" r="3.9" fill="#8fe0b0"/>
  </g>
  <text x="562" y="166" text-anchor="middle" class="lbl" font-size="13.5" font-weight="700" fill="#2f5d3a">現場の相棒AI</text>

  <!-- 下線メモ -->
  <text x="320" y="236" text-anchor="middle" class="lbl" font-size="12.5" fill="#7c7360">どれか一つからでも、始められます</text>
</svg>
