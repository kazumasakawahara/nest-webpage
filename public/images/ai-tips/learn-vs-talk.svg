<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="左は「パソコン教室のイメージ」として教本が高く積み上がった図、右は「AIの場合」としてマスコットが「話しかけるだけ」とひとこと言っている図の対比">
  <defs>
    <style>
      .cap { font-family: 'Zen Kurenaido', 'Shippori Mincho B1', serif; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="640" height="360" rx="16" fill="#faf6ef"/>

  <!-- 中央の仕切り -->
  <line x1="320" y1="40" x2="320" y2="320" stroke="#e6e0d4" stroke-width="2.5" stroke-dasharray="8 8"/>

  <!-- 左：パソコン教室のイメージ -->
  <text x="160" y="52" text-anchor="middle" class="cap" font-size="21" fill="#6b665e">パソコン教室のイメージ</text>

  <!-- 積み上がった教本 -->
  <g class="cap" font-size="15">
    <g transform="translate(85 262)">
      <rect width="150" height="34" rx="5" fill="#ffffff" stroke="#b85f3d" stroke-width="2.5"/>
      <text x="75" y="23" text-anchor="middle" fill="#2a2620">操作マニュアル 上</text>
    </g>
    <g transform="translate(95 226) rotate(-1)">
      <rect width="140" height="34" rx="5" fill="#f9e8df" stroke="#b85f3d" stroke-width="2.5"/>
      <text x="70" y="23" text-anchor="middle" fill="#2a2620">操作マニュアル 下</text>
    </g>
    <g transform="translate(80 190) rotate(1.5)">
      <rect width="145" height="34" rx="5" fill="#ffffff" stroke="#b85f3d" stroke-width="2.5"/>
      <text x="72" y="23" text-anchor="middle" fill="#2a2620">ショートカット集</text>
    </g>
    <g transform="translate(96 154) rotate(-2)">
      <rect width="130" height="34" rx="5" fill="#f0ead8" stroke="#b85f3d" stroke-width="2.5"/>
      <text x="65" y="23" text-anchor="middle" fill="#2a2620">専門用語辞典</text>
    </g>
    <g transform="translate(88 118) rotate(1)">
      <rect width="138" height="34" rx="5" fill="#ffffff" stroke="#b85f3d" stroke-width="2.5"/>
      <text x="69" y="23" text-anchor="middle" fill="#2a2620">設定ガイド</text>
    </g>
    <!-- あせマーク -->
    <path d="M242 108 q6 12 0 20 q-8 -6 0 -20z" fill="#7ea9d1" opacity="0.8"/>
    <path d="M256 128 q5 10 0 17 q-7 -5 0 -17z" fill="#7ea9d1" opacity="0.6"/>
  </g>
  <text x="160" y="330" text-anchor="middle" class="cap" font-size="17" fill="#b85f3d">おぼえることが、たくさん</text>

  <!-- 右：AIの場合 -->
  <text x="480" y="52" text-anchor="middle" class="cap" font-size="21" fill="#6b665e">AIの場合</text>

  <!-- マスコット（頭部のみ・にっこり） -->
  <g transform="translate(432,208) scale(0.42)">
    <!-- 髪（後ろ・白髪ウェーブ） -->
    <path d="M-72 6 C-88 -66 -44 -100 0 -100 C44 -100 88 -66 72 6 C64 -6 54 -4 48 8 C40 -8 30 -6 24 8 C16 -8 4 -8 -2 8 C-10 -8 -22 -8 -28 8 C-36 -6 -48 -6 -54 10 C-60 2 -66 2 -72 6 Z" fill="#8c908c"/>
    <circle cx="0" cy="0" r="60" fill="#f0c9a8"/>
    <path d="M-52 -52 C-30 -74 30 -74 52 -50" stroke="#a9ada8" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="-38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
    <circle cx="38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
    <!-- 笑顔の目（閉じた弧） -->
    <path d="M-38 6 Q-26 -8 -14 6" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M14 6 Q26 -8 38 6" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 金縁メガネ -->
    <g stroke="#c9a44a" stroke-width="3.5" fill="#ffffff" fill-opacity="0.14">
      <ellipse cx="-26" cy="6" rx="22" ry="15"/>
      <ellipse cx="26" cy="6" rx="22" ry="15"/>
    </g>
    <path d="M-4 4 Q0 -1 4 4" stroke="#c9a44a" stroke-width="3.5" fill="none"/>
    <line x1="-48" y1="2" x2="-64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
    <line x1="48" y1="2" x2="64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
    <!-- にっこりの口 -->
    <path d="M-16 34 Q0 46 16 34" stroke="#9e4a3a" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ふきだし（1つだけ） -->
  <g>
    <rect x="466" y="118" width="140" height="46" rx="14" fill="#ffffff" stroke="#2d5a27" stroke-width="2.5"/>
    <path d="M496 164 l-6 16 l16 -10 z" fill="#ffffff" stroke="#2d5a27" stroke-width="2.5"/>
    <text x="536" y="148" text-anchor="middle" class="cap" font-size="20" fill="#1a3d18">話しかけるだけ</text>
  </g>

  <text x="480" y="330" text-anchor="middle" class="cap" font-size="17" fill="#2d5a27">おぼえる操作は、ひとつ</text>
</svg>
