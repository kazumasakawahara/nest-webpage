<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320" role="img" aria-label="iPhone（Safari）でホーム画面に追加する3ステップのイメージ図。①下の共有ボタン（四角に上矢印）をタップ、②メニューを下にたどって「ホーム画面に追加」をタップ、③右上の「追加」をタップすると、ホーム画面にアイコンができる">
  <defs>
    <style>.lbl{font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}</style>
  </defs>

  <text x="320" y="34" text-anchor="middle" class="lbl" font-size="16" font-weight="700" fill="#5f5847">iPhone（Safari）でホーム画面に追加する</text>
  <text x="626" y="34" text-anchor="end" class="lbl" font-size="11" fill="#9a907c">※イメージ図</text>

  <!-- 矢印 -->
  <g fill="none" stroke="#b7ac97" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M206 188 h18"/><path d="M218 181 l9 7 -9 7"/>
    <path d="M416 188 h18"/><path d="M428 181 l9 7 -9 7"/>
  </g>

  <!-- ① 共有ボタン -->
  <rect x="20" y="52" width="180" height="248" rx="14" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="46" cy="80" r="14" fill="#d97757"/>
  <text x="46" y="85" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <text x="68" y="85" class="lbl" font-size="13.5" font-weight="700" fill="#5f5847">共有ボタンをタップ</text>
  <!-- phone -->
  <rect x="72" y="100" width="76" height="150" rx="12" fill="#ffffff" stroke="#7c7360" stroke-width="2.2"/>
  <rect x="82" y="112" width="56" height="104" rx="4" fill="#f4efe4"/>
  <!-- bottom bar with share icon -->
  <rect x="72" y="222" width="76" height="28" rx="0" fill="#eaf2e5"/>
  <g transform="translate(104,226)">
    <rect x="-9" y="6" width="18" height="14" rx="2.5" fill="none" stroke="#4a8c3f" stroke-width="2"/>
    <path d="M0 15 v-14 M-5 5 l5 -5 5 5" fill="none" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="110" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#9a907c">画面の下にある</text>
  <text x="110" y="289" text-anchor="middle" class="lbl" font-size="11.5" font-weight="700" fill="#2f5d3a">□に↑のマーク</text>

  <!-- ② ホーム画面に追加 -->
  <rect x="230" y="52" width="180" height="248" rx="14" fill="#eaf2e5" stroke="#bcd7b3" stroke-width="2"/>
  <circle cx="256" cy="80" r="14" fill="#4a8c3f"/>
  <text x="256" y="85" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <text x="278" y="85" class="lbl" font-size="13" font-weight="700" fill="#2f5d3a">メニューから選ぶ</text>
  <g transform="translate(250,102)">
    <rect x="0" y="0" width="140" height="30" rx="7" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.4"/>
    <text x="12" y="20" class="lbl" font-size="11.5" fill="#8a8472">コピー</text>
    <rect x="0" y="38" width="140" height="34" rx="7" fill="#ffffff" stroke="#4a8c3f" stroke-width="2.2"/>
    <rect x="9" y="47" width="16" height="16" rx="4" fill="none" stroke="#4a8c3f" stroke-width="2"/>
    <path d="M17 51 v8 M13 55 h8" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round"/>
    <text x="34" y="60" class="lbl" font-size="11.5" font-weight="700" fill="#264a2c">ホーム画面に追加</text>
    <rect x="0" y="78" width="140" height="30" rx="7" fill="#ffffff" stroke="#bcd7b3" stroke-width="1.4"/>
    <text x="12" y="98" class="lbl" font-size="11.5" fill="#8a8472">ブックマーク</text>
  </g>
  <text x="320" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#4a8c3f">少し下にたどると</text>
  <text x="320" y="289" text-anchor="middle" class="lbl" font-size="11.5" font-weight="700" fill="#2f5d3a">出てきます</text>

  <!-- ③ 追加で完了 -->
  <rect x="440" y="52" width="180" height="248" rx="14" fill="#efe9dd" stroke="#ddd3c1" stroke-width="1.5"/>
  <circle cx="466" cy="80" r="14" fill="#d97757"/>
  <text x="466" y="85" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <text x="488" y="85" class="lbl" font-size="13.5" font-weight="700" fill="#5f5847">「追加」で完了</text>
  <!-- home screen with icon -->
  <rect x="502" y="100" width="76" height="150" rx="12" fill="#ffffff" stroke="#7c7360" stroke-width="2.2"/>
  <rect x="524" y="120" width="32" height="32" rx="8" fill="#4a8c3f"/>
  <text x="540" y="141" text-anchor="middle" class="lbl" font-size="14" font-weight="700" fill="#ffffff">つ</text>
  <text x="540" y="168" text-anchor="middle" class="lbl" font-size="9.5" fill="#5f5847">つたえる</text>
  <rect x="514" y="188" width="52" height="52" rx="10" fill="#f4efe4"/>
  <text x="540" y="272" text-anchor="middle" class="lbl" font-size="11.5" fill="#9a907c">ホーム画面に</text>
  <text x="540" y="289" text-anchor="middle" class="lbl" font-size="11.5" font-weight="700" fill="#b05a3e">アイコンができる</text>
</svg>
