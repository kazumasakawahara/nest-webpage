<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="白髪に金縁メガネの笑顔の人が、ロボットの『AIさん』から便利ワザを教わっているイラスト。電球のひらめきマーク付き">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f5d3a"/>
      <stop offset="0.5" stop-color="#5a9a52"/>
      <stop offset="1" stop-color="#cf8b63"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf6ef"/>
      <stop offset="1" stop-color="#f0e6d3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe6a3" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe6a3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 720 C 360 640 620 760 900 700 C 1180 640 1420 720 1600 690 L1600 900 L0 900 Z" fill="#25492e" opacity="0.55"/>
  <path d="M0 790 C 300 740 640 830 980 780 C 1260 740 1460 800 1600 780 L1600 900 L0 900 Z" fill="#1a3521" opacity="0.7"/>
  <g fill="#faf6ef" opacity="0.5">
    <circle cx="220" cy="180" r="4"/>
    <circle cx="470" cy="120" r="3"/>
    <circle cx="1300" cy="120" r="4"/>
    <circle cx="1470" cy="230" r="3"/>
    <circle cx="1180" cy="80" r="2.5"/>
  </g>

  <!-- 吹き出し（ひらめきの電球）＝右上・他要素と重ならない位置 -->
  <g transform="translate(1230,120)">
    <path d="M30 20 H300 a34 34 0 0 1 34 34 V186 a34 34 0 0 1 -34 34 H150 l-28 46 -20 -46 H30 a34 34 0 0 1 -34 -34 V54 a34 34 0 0 1 34 -34 Z" fill="url(#paper)" stroke="#2f5d3a" stroke-width="5"/>
    <circle cx="164" cy="112" r="84" fill="url(#glow)"/>
    <path d="M164 52 a52 52 0 0 1 29 95 c-10 8 -12 16 -12 25 h-34 c0 -9 -2 -17 -12 -25 a52 52 0 0 1 29 -95 Z" fill="#ffd15c" stroke="#d99a2b" stroke-width="4"/>
    <rect x="147" y="176" width="34" height="9" rx="4" fill="#8a5a3c"/>
    <rect x="151" y="187" width="26" height="8" rx="4" fill="#6f4630"/>
    <!-- フィラメント（nest の N） -->
    <path d="M150 128 L150 96 L178 128 L178 96" fill="none" stroke="#d99a2b" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g stroke="#ffe6a3" stroke-width="5" stroke-linecap="round">
      <line x1="86" y1="64" x2="70" y2="52"/>
      <line x1="242" y1="64" x2="258" y2="52"/>
      <line x1="70" y1="112" x2="50" y2="112"/>
      <line x1="258" y1="112" x2="278" y2="112"/>
    </g>
  </g>

  <!-- 机（ロボットとノートPCが乗る） -->
  <rect x="1196" y="726" width="372" height="16" rx="8" fill="#8a5a3c"/>
  <rect x="1230" y="742" width="14" height="96" rx="5" fill="#6f4630"/>
  <rect x="1520" y="742" width="14" height="96" rx="5" fill="#6f4630"/>

  <!-- ノートPC -->
  <g transform="translate(1252,636)">
    <rect x="0" y="0" width="120" height="76" rx="8" fill="#2b3a2c"/>
    <rect x="9" y="9" width="102" height="58" rx="4" fill="#8fc98a"/>
    <rect x="20" y="20" width="60" height="7" rx="3.5" fill="#2b3a2c" opacity="0.6"/>
    <rect x="20" y="34" width="72" height="7" rx="3.5" fill="#2b3a2c" opacity="0.4"/>
    <rect x="-14" y="82" width="150" height="14" rx="6" fill="#3d5240"/>
  </g>

  <!-- ロボット「AIさん」＝右・机の上でジェスチャー -->
  <g transform="translate(1408,516)">
    <line x1="76" y1="34" x2="76" y2="6" stroke="#faf6ef" stroke-width="7" stroke-linecap="round"/>
    <circle cx="76" cy="-2" r="12" fill="#ffd15c"/>
    <rect x="20" y="34" width="112" height="98" rx="28" fill="#faf6ef" stroke="#2f5d3a" stroke-width="5"/>
    <rect x="40" y="56" width="72" height="54" rx="16" fill="#1f3a26"/>
    <circle cx="62" cy="82" r="10" fill="#8fe0b0"/>
    <circle cx="90" cy="82" r="10" fill="#8fe0b0"/>
    <path d="M64 100 Q76 110 88 100" fill="none" stroke="#8fe0b0" stroke-width="5" stroke-linecap="round"/>
    <circle cx="46" cy="102" r="6" fill="#d97757" opacity="0.85"/>
    <circle cx="106" cy="102" r="6" fill="#d97757" opacity="0.85"/>
    <rect x="34" y="138" width="84" height="78" rx="22" fill="#4a8c3f" stroke="#2f5d3a" stroke-width="5"/>
    <circle cx="76" cy="176" r="11" fill="#ffd15c"/>
    <!-- 左手を上げて説明 -->
    <path d="M34 168 C 2 162 -12 130 -6 104" fill="none" stroke="#4a8c3f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="-8" cy="98" r="14" fill="#faf6ef" stroke="#2f5d3a" stroke-width="4"/>
    <!-- 右手 -->
    <path d="M118 172 C 150 172 164 200 158 224" fill="none" stroke="#4a8c3f" stroke-width="18" stroke-linecap="round"/>
    <circle cx="160" cy="230" r="14" fill="#faf6ef" stroke="#2f5d3a" stroke-width="4"/>
  </g>

  <!-- つながりの点線（学ぶ人 ↔ ノートPC/AIさん） -->
  <path d="M1168 612 C 1210 636 1240 648 1268 656" fill="none" stroke="#faf6ef" stroke-width="4" stroke-dasharray="2 15" stroke-linecap="round" opacity="0.75"/>

  <!-- 学ぶ人（トップページのマスコットがモチーフ：白髪・金縁メガネ・紺フリース・カップ） -->
  <g transform="translate(1070,452)">
    <!-- あぐらの下半身 -->
    <path d="M-64 250 C-72 302 -18 320 10 302 C-4 326 -66 322 -72 286 Z" fill="#1c2942"/>
    <path d="M64 250 C72 302 18 320 -10 302 C4 326 66 322 72 286 Z" fill="#243654"/>
    <!-- 首（あごの直下・ごく短く。胴体とつなげる） -->
    <rect x="-14" y="48" width="28" height="22" rx="7" fill="#e6b892"/>
    <!-- 胴体（紺フリース。肩をあご下まで引き上げて首と密着） -->
    <path d="M-66 252 C-78 168 -58 80 -18 64 C-8 58 8 58 18 64 C58 80 78 168 66 252 Z" fill="#22314f"/>
    <!-- 襟 -->
    <path d="M-30 70 Q0 56 30 70 L22 98 Q0 84 -22 98 Z" fill="#2c3c5e"/>
    <!-- インナー -->
    <path d="M-17 78 Q0 68 17 78 L11 100 Q0 92 -11 100 Z" fill="#e9eef5"/>
    <line x1="0" y1="96" x2="0" y2="244" stroke="#33456b" stroke-width="3"/>
    <rect x="-4" y="150" width="8" height="12" rx="3" fill="#9aa7c0"/>
    <!-- 髪（後ろ・白髪ウェーブ） -->
    <path d="M-72 6 C-88 -66 -44 -100 0 -100 C44 -100 88 -66 72 6 C64 -6 54 -4 48 8 C40 -8 30 -6 24 8 C16 -8 4 -8 -2 8 C-10 -8 -22 -8 -28 8 C-36 -6 -48 -6 -54 10 C-60 2 -66 2 -72 6 Z" fill="#8c908c"/>
    <!-- 顔 -->
    <circle cx="0" cy="0" r="60" fill="#f0c9a8"/>
    <!-- 前髪の毛流れ -->
    <path d="M-52 -52 C-30 -74 30 -74 52 -50" stroke="#a9ada8" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M-44 -34 C-30 -50 -6 -52 6 -40" stroke="#7d817d" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M46 -30 C34 -46 14 -48 4 -38" stroke="#7d817d" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- ほほ -->
    <circle cx="-38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
    <circle cx="38" cy="24" r="10" fill="#e79a78" opacity="0.5"/>
    <!-- 笑顔の目（閉じた弧） -->
    <path d="M-38 6 Q-26 -8 -14 6" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M14 6 Q26 -8 38 6" stroke="#4a3b2f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- 金縁メガネ -->
    <g stroke="#c9a44a" stroke-width="3.5" fill="#ffffff" fill-opacity="0.14">
      <ellipse cx="-26" cy="6" rx="22" ry="15"/>
      <ellipse cx="26" cy="6" rx="22" ry="15"/>
    </g>
    <path d="M-4 4 Q0 -1 4 4" stroke="#c9a44a" stroke-width="3.5" fill="none"/>
    <line x1="-48" y1="2" x2="-64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
    <line x1="48" y1="2" x2="64" y2="-4" stroke="#c9a44a" stroke-width="3"/>
    <!-- 大きな笑顔 -->
    <path d="M-26 30 Q0 40 26 30 Q0 68 -26 30 Z" fill="#9e4a3a"/>
    <path d="M-21 32 Q0 40 21 32 Q0 35 -21 32 Z" fill="#faf6ef"/>
    <!-- 腕（カップを持つ） -->
    <path d="M-56 132 C-64 178 -32 198 -8 198" fill="none" stroke="#22314f" stroke-width="30" stroke-linecap="round"/>
    <path d="M56 132 C64 178 32 198 8 198" fill="none" stroke="#243654" stroke-width="30" stroke-linecap="round"/>
    <!-- カップ -->
    <path d="M-17 176 h34 a4 4 0 0 1 4 4 v13 a13 13 0 0 1 -13 13 h-16 a13 13 0 0 1 -13 -13 v-13 a4 4 0 0 1 4 -4 Z" fill="#ffffff" stroke="#d9cfbb" stroke-width="1.5"/>
    <path d="M21 182 a9 9 0 0 1 0 18" fill="none" stroke="#d9cfbb" stroke-width="3"/>
    <ellipse cx="0" cy="180" rx="15" ry="4.5" fill="#8a5a3c"/>
    <path d="M-6 168 q-4 -8 2 -14" stroke="#faf6ef" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M8 168 q4 -8 -2 -14" stroke="#faf6ef" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- 手 -->
    <circle cx="-12" cy="198" r="13" fill="#f0c9a8"/>
    <circle cx="12" cy="198" r="13" fill="#f0c9a8"/>
  </g>
</svg>
