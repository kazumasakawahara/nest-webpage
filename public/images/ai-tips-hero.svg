<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="ロボットの『AIさん』と人が対話し、電球がひらめくイラスト">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f5d3a"/>
      <stop offset="0.5" stop-color="#5a9a52"/>
      <stop offset="1" stop-color="#cf8b63"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf6ef"/>
      <stop offset="1" stop-color="#f0e6d3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe6a3" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe6a3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- 柔らかな丘 -->
  <path d="M0 720 C 360 640 620 760 900 700 C 1180 640 1420 720 1600 690 L1600 900 L0 900 Z" fill="#25492e" opacity="0.55"/>
  <path d="M0 790 C 300 740 640 830 980 780 C 1260 740 1460 800 1600 780 L1600 900 L0 900 Z" fill="#1a3521" opacity="0.7"/>

  <!-- 遠景の光の粒 -->
  <g fill="#faf6ef" opacity="0.5">
    <circle cx="220" cy="180" r="4"/>
    <circle cx="470" cy="120" r="3"/>
    <circle cx="1290" cy="150" r="4"/>
    <circle cx="1420" cy="260" r="3"/>
    <circle cx="1150" cy="90" r="2.5"/>
  </g>

  <!-- 対話グループ（右寄せ） -->
  <g transform="translate(150,0)">

    <!-- 机 -->
    <rect x="560" y="678" width="720" height="20" rx="10" fill="#8a5a3c"/>
    <rect x="600" y="698" width="16" height="120" rx="6" fill="#6f4630"/>
    <rect x="1224" y="698" width="16" height="120" rx="6" fill="#6f4630"/>

    <!-- 人（左側・ノートPCに向かう） -->
    <g>
      <!-- 椅子の背 -->
      <rect x="600" y="470" width="14" height="210" rx="7" fill="#3c6b42"/>
      <!-- 胴体 -->
      <path d="M636 678 C 636 566 700 540 742 540 C 792 540 840 574 840 678 Z" fill="#d97757"/>
      <!-- 頭 -->
      <circle cx="742" cy="486" r="52" fill="#f0c9a8"/>
      <path d="M694 470 C 700 420 786 420 792 470 C 792 452 776 430 742 430 C 712 430 696 450 694 470 Z" fill="#3a2c22"/>
      <!-- 腕（キーボードへ） -->
      <path d="M836 612 C 900 616 940 640 958 664" fill="none" stroke="#c9673f" stroke-width="26" stroke-linecap="round"/>
      <!-- ノートPC -->
      <g>
        <rect x="948" y="600" width="140" height="86" rx="8" fill="#2b3a2c"/>
        <rect x="958" y="610" width="120" height="66" rx="4" fill="#8fc98a"/>
        <rect x="936" y="672" width="176" height="16" rx="6" fill="#3d5240"/>
      </g>
    </g>

    <!-- ロボット「AIさん」（右側） -->
    <g transform="translate(1040,300)">
      <!-- アンテナ -->
      <line x1="120" y1="86" x2="120" y2="40" stroke="#faf6ef" stroke-width="8" stroke-linecap="round"/>
      <circle cx="120" cy="30" r="16" fill="#ffd15c"/>
      <!-- 頭部 -->
      <rect x="34" y="86" width="172" height="150" rx="40" fill="#faf6ef"/>
      <rect x="34" y="86" width="172" height="150" rx="40" fill="none" stroke="#2f5d3a" stroke-width="6"/>
      <!-- 顔パネル -->
      <rect x="60" y="118" width="120" height="86" rx="24" fill="#1f3a26"/>
      <!-- 目 -->
      <circle cx="98" cy="160" r="15" fill="#8fe0b0"/>
      <circle cx="142" cy="160" r="15" fill="#8fe0b0"/>
      <!-- ほほ -->
      <circle cx="72" cy="192" r="9" fill="#d97757" opacity="0.85"/>
      <circle cx="168" cy="192" r="9" fill="#d97757" opacity="0.85"/>
      <!-- 微笑み -->
      <path d="M104 188 Q120 202 136 188" fill="none" stroke="#8fe0b0" stroke-width="6" stroke-linecap="round"/>
      <!-- 胴体 -->
      <rect x="52" y="244" width="136" height="120" rx="30" fill="#4a8c3f"/>
      <rect x="52" y="244" width="136" height="120" rx="30" fill="none" stroke="#2f5d3a" stroke-width="6"/>
      <circle cx="120" cy="300" r="16" fill="#ffd15c"/>
      <!-- 手を挙げて説明 -->
      <path d="M52 300 C 8 296 -8 250 6 214" fill="none" stroke="#4a8c3f" stroke-width="24" stroke-linecap="round"/>
      <circle cx="6" cy="206" r="18" fill="#faf6ef" stroke="#2f5d3a" stroke-width="5"/>
      <path d="M188 300 C 232 300 250 340 244 372" fill="none" stroke="#4a8c3f" stroke-width="24" stroke-linecap="round"/>
      <circle cx="246" cy="380" r="18" fill="#faf6ef" stroke="#2f5d3a" stroke-width="5"/>
    </g>

    <!-- 吹き出し（ひらめきの電球） -->
    <g transform="translate(866,300)">
      <path d="M40 20 H300 a36 36 0 0 1 36 36 V196 a36 36 0 0 1 -36 36 H150 l-46 54 -6 -54 H40 a36 36 0 0 1 -36 -36 V56 a36 36 0 0 1 36 -36 Z" fill="url(#paper)" stroke="#2f5d3a" stroke-width="5"/>
      <!-- 電球の光 -->
      <circle cx="168" cy="118" r="92" fill="url(#glow)"/>
      <!-- 電球本体 -->
      <path d="M168 54 a54 54 0 0 1 30 99 c-10 8 -12 16 -12 26 h-36 c0 -10 -2 -18 -12 -26 a54 54 0 0 1 30 -99 Z" fill="#ffd15c" stroke="#d99a2b" stroke-width="4"/>
      <rect x="150" y="182" width="36" height="10" rx="4" fill="#8a5a3c"/>
      <rect x="154" y="194" width="28" height="8" rx="4" fill="#6f4630"/>
      <!-- フィラメント -->
      <path d="M156 150 L164 122 L172 150 L180 122" fill="none" stroke="#d99a2b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- きらめき -->
      <g stroke="#ffe6a3" stroke-width="5" stroke-linecap="round">
        <line x1="86" y1="70" x2="70" y2="58"/>
        <line x1="252" y1="70" x2="268" y2="58"/>
        <line x1="72" y1="120" x2="52" y2="120"/>
        <line x1="264" y1="120" x2="284" y2="120"/>
      </g>
    </g>

    <!-- つながりの点線（人 ↔ AI） -->
    <path d="M872 560 C 970 590 1060 590 1140 566" fill="none" stroke="#faf6ef" stroke-width="4" stroke-dasharray="2 16" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
