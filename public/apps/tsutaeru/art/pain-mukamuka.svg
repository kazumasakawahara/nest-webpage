  <rect x="6" y="6" width="108" height="108" rx="22" fill="#efe9dd"/>
  <!-- 頭 -->
  <circle cx="60" cy="25" r="13" fill="#f2d9ae" stroke="#5f5847" stroke-width="2.5"/>
