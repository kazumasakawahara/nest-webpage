<?xml version="1.0" encoding="UTF-8"?>
<!-- つたえるカード art: pain-hirihiri / ヒリヒリ (scraped skin stinging) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="ヒリヒリ">
  <rect x="6" y="6" width="108" height="108" rx="22" fill="#efe9dd"/>
  <!-- 腕（皮膚） -->
  <path d="M16 88 q0 -16 16 -16 l56 0 q16 0 16 16 l0 16 l-88 0 z" fill="#f2d9ae" stroke="#5f5847" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- すりむけて赤くなった部分 -->
  <ellipse cx="60" cy="82" rx="18" ry="8" fill="#e8a08a"/>
  <ellipse cx="60" cy="82" rx="18" ry="8" fill="none" stroke="#d97757" stroke-width="1.6" opacity="0.7"/>
  <!-- ひっかき傷の線 -->
  <g fill="none" stroke="#b05a3e" stroke-width="2.4" stroke-linecap="round">
    <path d="M50 80 l8 -1.5"/>
    <path d="M55 85 l10 -1"/>
    <path d="M64 80 l7 1"/>
  </g>
  <!-- まわりが、ちりちり痛む -->
  <g fill="none" stroke="#d97757" stroke-width="2.6" stroke-linecap="round">
    <line x1="60" y1="67" x2="60" y2="59"/>
    <line x1="51" y1="68.5" x2="48" y2="60.5"/>
    <line x1="69" y1="68.5" x2="72" y2="60.5"/>
    <line x1="43" y1="71" x2="38" y2="64"/>
    <line x1="77" y1="71" x2="82" y2="64"/>
    <line x1="38" y1="77" x2="30" y2="74"/>
    <line x1="82" y1="77" x2="90" y2="74"/>
  </g>
</svg>
